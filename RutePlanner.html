function _sjGeoRenderList(){
  const ctx = window._sjGeoCtx;
  if (!ctx) return;
  const cust = db.customers.find(c=>c.id===ctx.custId);
  if (!cust) return;
  const list = cust.lokasi || [];
  const el = document.getElementById('sjGeoLokasiList');
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = `<div class="p-3 text-center text-xs text-slate-400 border border-dashed border-[var(--c-line)] rounded-lg">
      Belum ada alamat tersimpan. Klik peta atau isi lat-lng di bawah, lalu Simpan.
    </div>`;
    return;
  }
  el.innerHTML = list.map((l,i)=>{
    const has = !!(l.lat && l.lng);
    return `<div class="border ${has?'border-[var(--c-line)]':'border-amber-300'} rounded-lg p-2 flex items-start gap-2">
      <div class="mt-0.5">
        <i data-lucide="${has?'map-pin':'map-pin-off'}" class="w-4 h-4 ${has?'text-emerald-600':'text-amber-600'}"></i>
      </div>
      <div class="min-w-0 flex-1">
        <div class="text-xs font-bold text-slate-700">${l.label||'Alamat'}</div>
        <div class="text-[11px] text-slate-500 truncate">${l.alamat||'(tanpa alamat)'}</div>
        ${has
          ? `<div class="text-[10px] text-slate-400 font-mono">${l.lat.toFixed(5)}, ${l.lng.toFixed(5)}</div>`
          : `<div class="text-[10px] text-amber-600 font-semibold">Belum ada koordinat — klik peta untuk set</div>`}
      </div>
      <div class="flex gap-1">
        ${has?`<button onclick="_sjGeoFocus(${l.lat},${l.lng})" class="text-[10px] px-2 py-1 rounded bg-[var(--c-surface-var)] hover:bg-[var(--c-accent)] hover:text-white" title="Pusatkan peta">
          <i data-lucide="crosshair" class="w-3 h-3"></i>
        </button>`:`<button onclick="_sjGeoSetCoordOnExisting('${l.id}')" class="text-[10px] px-2 py-1 rounded bg-amber-100 text-amber-700 hover:bg-amber-200" title="Pakai koordinat dari input">
          <i data-lucide="save" class="w-3 h-3"></i>
        </button>`}
        <button onclick="_sjGeoDelLokasi('${l.id}')" class="text-[10px] px-2 py-1 rounded bg-red-50 text-red-600 hover:bg-red-100" title="Hapus alamat">
          <i data-lucide="trash-2" class="w-3 h-3"></i>
        </button>
      </div>
    </div>`;
  }).join('');
  lucide.createIcons();
}

function _sjGeoInitMap(list){
  const s = db.settings;
  // Center: first geo or gudang
  const first = list.find(l=>l.lat && l.lng);
  const lat0 = first?.lat || s.gudangLat || -5.1477;
  const lng0 = first?.lng || s.gudangLng || 119.4327;
  const map = L.map('sjGeoMap').setView([lat0,lng0], first?15:12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {maxZoom:19, attribution:'© OSM © CARTO'}).addTo(map);
  window._modalMap = map;
  if (s.gudangLat && s.gudangLng) {
    const ico = L.divIcon({html:'<div class="warehouse-marker"><i data-lucide="warehouse"></i></div>',
      className:'', iconSize:[34,34], iconAnchor:[17,17]});
    L.marker([s.gudangLat,s.gudangLng], {icon:ico}).addTo(map).bindPopup('Gudang');
  }
  list.forEach(l=>{
    if (l.lat && l.lng) {
      L.circleMarker([l.lat,l.lng], {radius:7, color:'#03DAC6', fillColor:'#03DAC6', fillOpacity:0.85, weight:2})
        .bindPopup(`<strong>${l.label}</strong><br>${l.alamat||''}`).addTo(map);
    }
  });
  let pin = null;
  map.on('click', async e=>{
    const {lat,lng} = e.latlng;
    if (pin) pin.remove();
    pin = L.marker([lat,lng], {draggable:true}).addTo(map);
    pin.on('dragend', ev=>{
      const ll = ev.target.getLatLng();
      document.getElementById('sjGeoLatInput').value = ll.lat.toFixed(6);
      document.getElementById('sjGeoLngInput').value = ll.lng.toFixed(6);
    });
    document.getElementById('sjGeoLatInput').value = lat.toFixed(6);
    document.getElementById('sjGeoLngInput').value = lng.toFixed(6);
  });
  setTimeout(()=>map.invalidateSize(), 200);
}

function _sjGeoFocus(lat,lng){
  if (window._modalMap) window._modalMap.setView([lat,lng], 17);
}

function _sjGeoSetCoordOnExisting(lokasiId){
  const ctx = window._sjGeoCtx;
  const cust = ctx && db.customers.find(c=>c.id===ctx.custId);
  if (!cust) return;
  const lat = parseFloat(document.getElementById('sjGeoLatInput').value);
  const lng = parseFloat(document.getElementById('sjGeoLngInput').value);
  if (isNaN(lat) || isNaN(lng)) return toast('Isi lat/lng dulu di input bawah','error');
  const l = (cust.lokasi||[]).find(x=>x.id===lokasiId);
  if (!l) return;
  l.lat = lat; l.lng = lng;
  saveDB();
  toast('Koordinat alamat ter-update ✓');
  // Refresh modal
  closeModal();
  openSJGeoModal(ctx.sjId);
  renderSuratJalan();
}

function _sjGeoDelLokasi(lokasiId){
  const ctx = window._sjGeoCtx;
  const cust = ctx && db.customers.find(c=>c.id===ctx.custId);
  if (!cust) return;
  cust.lokasi = (cust.lokasi||[]).filter(l=>l.id!==lokasiId);
  saveDB();
  _sjGeoRenderList();
  renderSuratJalan();
  toast('Alamat dihapus');
}

/* If user pastes "lat, lng" into latitude input, auto-split to both fields */
function _sjGeoSplitPaste(){
  const latEl = document.getElementById('sjGeoLatInput');
  const lngEl = document.getElementById('sjGeoLngInput');
  if (!latEl) return;
  const v = latEl.value;
  const m = v.match(/^\s*(-?\d+\.?\d*)\s*[,;\s]+\s*(-?\d+\.?\d*)\s*$/);
  if (m) {
    latEl.value = m[1];
    lngEl.value = m[2];
  }
}

function _sjGeoSaveNew(){
  const ctx = window._sjGeoCtx;
  const cust = ctx && db.customers.find(c=>c.id===ctx.custId);
  const sj   = ctx && (db.suratJalan||[]).find(s=>s.id===ctx.sjId);
  if (!cust || !sj) return;
  const lat = parseFloat(document.getElementById('sjGeoLatInput').value);
  const lng = parseFloat(document.getElementById('sjGeoLngInput').value);
  const label = document.getElementById('sjGeoLabel').value.trim() || ('Dari SJ '+sj.noDO);
  if (isNaN(lat) || isNaN(lng)) return toast('Isi lat/lng dulu (klik peta / paste / ketik)','error');
  if (!Array.isArray(cust.lokasi)) cust.lokasi = [];
  // Skip duplicate within ~1m
  const dup = cust.lokasi.find(l => l.lat && l.lng &&
    Math.abs(l.lat-lat) < 1e-5 && Math.abs(l.lng-lng) < 1e-5);
  if (dup) {
    toast('Koordinat ini sudah ada di daftar','info');
    return;
  }
  cust.lokasi.push({
    id: uid(),
    label,
    alamat: sj.alamat || '',
    lat, lng
  });
  saveDB();
  toast('Alamat baru disimpan ✓');
  closeModal();
  openSJGeoModal(ctx.sjId);
  renderSuratJalan();
}

/* --- Debounced search input (avoids re-render storm + focus loss) --- */
function _sjDebouncedFilter(val){
  window._sjFilterQ = val;
  clearTimeout(window._sjFilterTimer);
  window._sjFilterTimer = setTimeout(()=>{
    renderSuratJalan();
    // Restore focus + cursor to end
    const box = document.getElementById('sjSearchBox');
    if (box) {
      box.focus();
      const len = box.value.length;
      try { box.setSelectionRange(len, len); } catch(e){}
    }
  }, 220);
}

                        <button onclick="deleteSJ('${s.id}')" class="p-1.5 hover:bg-red-50 rounded-lg text-red-500" title="Hapus">
                          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>`:''}
                    </div>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`}
  `;
  lucide.createIcons();
}

document.addEventListener('DOMContentLoaded', ()=>{
  // Restore theme
  if (localStorage.getItem('rp_theme') === 'dark') {
    document.documentElement.dataset.theme = 'dark';
    const lbl = document.getElementById('themeLabel');
    if (lbl) lbl.textContent = 'Mode Terang';
    const icon = document.getElementById('themeIcon');
    if (icon) icon.setAttribute('data-lucide','sun');
  }
  lucide.createIcons();
  _updateSJBadge();
  setView('dashboard');
});
</script>
