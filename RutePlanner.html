<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RutePlanner v2.0 - Aplikasi Perencanaan Pengiriman</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  /* ── Material Design Color System ── */
  :root{
    /* Light Mode — sesuai palet gambar kolom 1 */
    --c-bg:#FFFBFE;
    --c-ink:#1C1B1F;
    --c-sub:#625B71;
    --c-line:#CAC4D0;
    --c-card:#FFFFFF;
    --c-surface-var:#F3EEFF;
    --c-accent:#6200EE;        /* Primary #6200EE */
    --c-accent-dark:#3700B3;   /* Primary Variant #3700B3 */
    --c-navy:#6200EE;          /* Sidebar = Primary */
    --c-secondary:#03DAC6;     /* Secondary #03DAC6 */
    --c-secondary-dark:#018786;/* Secondary Variant #018786 */
    --c-green:#018786;
    --c-red:#B00020;           /* Error #B00020 */
    --c-blue:#6200EE;
  }
  *{font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif}
  .display{font-family:'Bricolage Grotesque',serif;letter-spacing:-.02em}
  body{background:var(--c-bg);color:var(--c-ink)}

  /* Scrollbar */
  .scrollbar::-webkit-scrollbar{width:8px;height:8px}
  .scrollbar::-webkit-scrollbar-thumb{background:#CAC4D0;border-radius:4px}
  .scrollbar::-webkit-scrollbar-track{background:transparent}

  /* Sidebar nav */
  .nav-item{transition:all .15s ease}
  .nav-item:hover{background:rgba(255,255,255,.12)}
  .nav-item.active{background:var(--c-secondary);color:#000000;font-weight:600}
  .nav-item.active .icon{color:#000000}

  /* Stat cards */
  .stat-card{background:linear-gradient(135deg,#FFFFFF 0%,#F3EEFF 100%);border:1px solid var(--c-line)}

  /* Buttons */
  .btn-primary{background:var(--c-accent);color:#FFFFFF;font-weight:600;transition:all .15s}
  .btn-primary:hover{background:var(--c-accent-dark);color:#FFFFFF}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed}
  .btn-secondary{background:#FFFFFF;color:var(--c-accent);border:1px solid var(--c-line);font-weight:600;transition:all .15s}
  .btn-secondary:hover{background:var(--c-surface-var);border-color:var(--c-accent)}
  .btn-danger{background:#FCDDE1;color:#B00020;font-weight:500;transition:all .15s}
  .btn-danger:hover{background:#F9BAC1}
  .btn-info{background:#E8DEF8;color:#6200EE;font-weight:600;transition:all .15s}
  .btn-info:hover{background:#D0BCFF}
  .btn-success{background:#C8F7F3;color:#018786;font-weight:600;transition:all .15s}
  .btn-success:hover{background:#03DAC6;color:#000}

  /* Form */
  input,select,textarea{font-family:inherit}
  .input{width:100%;padding:.55rem .75rem;border:1px solid var(--c-line);border-radius:8px;font-size:.875rem;background:white;outline:none;transition:all .15s;color:var(--c-ink)}
  .input:focus{border-color:var(--c-accent);box-shadow:0 0 0 3px rgba(98,0,238,.15)}
  .label{font-size:.75rem;font-weight:600;color:var(--c-sub);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem;display:block}

  /* Badges */
  .badge{display:inline-flex;align-items:center;gap:.25rem;padding:.15rem .55rem;border-radius:999px;font-size:.7rem;font-weight:600}
  .badge-draft{background:#E8DEF8;color:#3700B3}
  .badge-planned{background:#FFF8E1;color:#E65100}
  .badge-done{background:#C8F7F3;color:#018786}
  .badge-selesai{background:#C8F7F3;color:#018786}
  .badge-approved{background:#E8DEF8;color:#6200EE}
  .badge-danger{background:#FCDDE1;color:#B00020}
  .badge-optimized{background:#E8DEF8;color:#6200EE}

  /* Table */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;padding:.75rem;font-size:.7rem;font-weight:700;color:var(--c-sub);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--c-accent);background:var(--c-surface-var)}
  td{padding:.75rem;font-size:.875rem;border-bottom:1px solid var(--c-line);vertical-align:top}
  tr:hover td{background:#F3EEFF}

  /* Modal */
  .modal-bg{background:rgba(28,27,31,.7);backdrop-filter:blur(4px)}

  /* Tabs */
  .tab-btn{padding:.5rem 1rem;font-size:.875rem;font-weight:600;border-bottom:2px solid transparent;color:var(--c-sub);cursor:pointer;transition:all .15s}
  .tab-btn.active{color:var(--c-accent);border-color:var(--c-accent)}
  .tab-btn:hover:not(.active){color:var(--c-ink);background:var(--c-surface-var)}

  /* Map */
  .map-container{height:380px;width:100%;border-radius:10px;overflow:hidden;border:1px solid var(--c-line)}
  .map-small{height:240px}
  .map-route{height:420px}
  .leaflet-container{font-family:inherit}
  #modal{z-index:2000!important}
  #toast{z-index:2001!important}

  /* Search */
  .search-result-item{padding:.6rem .75rem;border-bottom:1px solid var(--c-line);cursor:pointer;font-size:.875rem}
  .search-result-item:hover{background:#E8DEF8}

  /* Map markers */
  .stop-num-marker{
    background:var(--c-accent);color:#FFFFFF;border:2px solid var(--c-accent-dark);
    border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:.85rem;box-shadow:0 2px 8px rgba(98,0,238,.4)
  }
  .warehouse-marker{
    background:var(--c-accent-dark);color:var(--c-secondary);border:2px solid var(--c-secondary);
    border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;
    font-size:1rem;box-shadow:0 2px 8px rgba(55,0,179,.5)
  }
  .spinner{
    border:3px solid #E8DEF8;border-top-color:var(--c-accent);
    border-radius:50%;width:18px;height:18px;animation:spin .8s linear infinite;display:inline-block
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── Dark Mode — palet gambar kolom 2 ── */
  [data-theme="dark"]{
    --c-bg:#121212;
    --c-ink:#E6E1E5;
    --c-sub:#CAC4D0;
    --c-line:#2C2B30;
    --c-card:#1E1E1E;
    --c-surface-var:#2D2640;
    --c-accent:#BB86FC;        /* Primary dark #BB86FC */
    --c-accent-dark:#3700B3;   /* Primary Variant (tetap) */
    --c-navy:#1C1C1C;          /* Sidebar dark = surface gelap */
    --c-secondary:#03DAC6;     /* Secondary tetap */
    --c-secondary-dark:#03DAC6;
    --c-green:#03DAC6;
    --c-red:#CF6679;           /* Error dark #CF6679 */
    --c-blue:#BB86FC;
  }
  [data-theme="dark"] body{background:var(--c-bg);color:var(--c-ink)}

  [data-theme="dark"] .stat-card{
    background:linear-gradient(135deg,#1E1E1E 0%,#2D2640 100%)!important;
    border-color:#3C3556
  }
  [data-theme="dark"] .bg-white,
  [data-theme="dark"] .bg-slate-50,
  [data-theme="dark"] .bg-slate-100{background:#1E1E1E!important;color:var(--c-ink)}

  [data-theme="dark"] th{background:#2D2640;color:#CAC4D0;border-bottom-color:#BB86FC}
  [data-theme="dark"] td{border-color:#2C2B30;color:var(--c-ink)}
  [data-theme="dark"] tr:hover td{background:#2D2640}

  [data-theme="dark"] .input{background:#2C2B30;color:var(--c-ink);border-color:#49454F}
  [data-theme="dark"] .input:focus{border-color:#BB86FC;box-shadow:0 0 0 3px rgba(187,134,252,.2)}

  [data-theme="dark"] .btn-primary{background:#BB86FC;color:#000000}
  [data-theme="dark"] .btn-primary:hover{background:#D0BCFF;color:#000000}
  [data-theme="dark"] .btn-secondary{background:#2C2B30;color:#BB86FC;border-color:#49454F}
  [data-theme="dark"] .btn-secondary:hover{background:#2D2640;border-color:#BB86FC}
  [data-theme="dark"] .btn-info{background:#2D2640;color:#BB86FC}
  [data-theme="dark"] .btn-info:hover{background:#3C3556}
  [data-theme="dark"] .btn-success{background:#013331;color:#03DAC6}
  [data-theme="dark"] .btn-success:hover{background:#03DAC6;color:#000}
  [data-theme="dark"] .btn-danger{background:#3C1420;color:#CF6679}
  [data-theme="dark"] .btn-danger:hover{background:#CF6679;color:#000}

  [data-theme="dark"] .badge-draft{background:#2C2B30;color:#CAC4D0}
  [data-theme="dark"] .badge-planned{background:#332B00;color:#FFD54F}
  [data-theme="dark"] .badge-selesai,[data-theme="dark"] .badge-done{background:#013331;color:#03DAC6}
  [data-theme="dark"] .badge-approved{background:#2D2640;color:#BB86FC}
  [data-theme="dark"] .badge-danger{background:#3C1420;color:#CF6679}
  [data-theme="dark"] .badge-optimized{background:#2D2640;color:#BB86FC}

  [data-theme="dark"] #modal>div{background:#1E1E1E!important}
  [data-theme="dark"] #modal .bg-white,[data-theme="dark"] #modal .bg-slate-50{background:#2C2B30!important}
  [data-theme="dark"] .border-\[var\(--c-line\)\]{border-color:#2C2B30}

  [data-theme="dark"] .tab-btn.active{color:#BB86FC;border-color:#BB86FC}
  [data-theme="dark"] .tab-btn:hover:not(.active){background:#2D2640}

  [data-theme="dark"] .text-slate-500,
  [data-theme="dark"] .text-slate-600,
  [data-theme="dark"] .text-slate-400{color:#CAC4D0!important}
  [data-theme="dark"] .text-slate-700,
  [data-theme="dark"] .text-slate-800,
  [data-theme="dark"] .text-slate-900{color:#E6E1E5!important}

  [data-theme="dark"] .nav-item.active{background:rgba(3,218,198,.2);color:#03DAC6}
  [data-theme="dark"] .nav-item.active .icon{color:#03DAC6}
  [data-theme="dark"] .nav-item:hover{background:rgba(255,255,255,.06)}

  [data-theme="dark"] .search-result-item:hover{background:#2D2640}
  [data-theme="dark"] .search-result-item{border-color:#2C2B30;color:var(--c-ink)}
  [data-theme="dark"] select option{background:#1E1E1E;color:var(--c-ink)}

  [data-theme="dark"] .stop-num-marker{
    background:#BB86FC;color:#000;border-color:#3700B3;
    box-shadow:0 2px 8px rgba(187,134,252,.4)
  }
  [data-theme="dark"] .warehouse-marker{
    background:#1C1C1C;color:#03DAC6;border-color:#03DAC6;
    box-shadow:0 2px 8px rgba(3,218,198,.4)
  }
  [data-theme="dark"] .spinner{border-color:#2D2640;border-top-color:#BB86FC}
  [data-theme="dark"] .scrollbar::-webkit-scrollbar-thumb{background:#49454F}

  /* ── Light mode: remap Tailwind colors ke Material palette ── */
  /* Blue → Primary Purple */
  .bg-blue-50{background:#ECE8FD!important}.bg-blue-100{background:#DDD6FB!important}
  .text-blue-600{color:#6200EE!important}.text-blue-700{color:#3700B3!important}
  .border-blue-200{border-color:#C5B8F8!important}.border-blue-400{border-color:#9A75F5!important}
  /* Emerald → Secondary Teal */
  .bg-emerald-50{background:#E0FAF8!important}.bg-emerald-100{background:#B0EEE9!important}
  .bg-emerald-500{background:#03DAC6!important}.bg-emerald-900\/40{background:rgba(1,135,134,.25)!important}
  .text-emerald-300{color:#5FE8DF!important}.text-emerald-400{color:#03DAC6!important}
  .text-emerald-600{color:#018786!important}.text-emerald-700{color:#017170!important}
  .text-emerald-800{color:#015857!important}.text-emerald-900{color:#014444!important}
  .border-emerald-200{border-color:#7FD8D4!important}.border-emerald-500{border-color:#03DAC6!important}
  /* Purple → Primary */
  .bg-purple-100{background:#E8DEF8!important}.text-purple-700{color:#6200EE!important}
  /* Amber → stays (Material amber warning) */
  .text-amber-400{color:#F59300!important}.text-amber-700{color:#C75000!important}
  .text-amber-800{color:#9B3E00!important}.text-amber-900{color:#7B3100!important}
  .bg-amber-50{background:#FFF8E1!important}.bg-amber-100{background:#FFECB3!important}
  .border-amber-100{border-color:#FFE082!important}.border-amber-200{border-color:#FFCA28!important}
  /* Yellow */
  .bg-yellow-50{background:#FFFDE7!important}.border-yellow-400{border-color:#FDD835!important}
  /* Red → Error */
  .text-red-300{color:#EF9A9A!important}.text-red-400{color:#EF5350!important}
  .text-red-600{color:#B00020!important}.text-red-700{color:#8E001A!important}
  .text-red-800{color:#6D0014!important}
  .bg-red-50{background:#FCDDE1!important}.bg-red-900\/40{background:rgba(176,0,32,.15)!important}
  .border-red-200{border-color:#F28B9A!important}

  /* ── Dark mode: override semua Tailwind color classes ── */
  /* Amber/Warning */
  [data-theme="dark"] .bg-amber-50{background:#332B00!important}
  [data-theme="dark"] .bg-amber-100{background:#3D3200!important}
  [data-theme="dark"] .text-amber-400{color:#FFD54F!important}
  [data-theme="dark"] .text-amber-600,[data-theme="dark"] .text-amber-700{color:#FFC107!important}
  [data-theme="dark"] .text-amber-800,[data-theme="dark"] .text-amber-900{color:#FFB300!important}
  [data-theme="dark"] .border-amber-100,[data-theme="dark"] .border-amber-200{border-color:#5C4700!important}
  /* Emerald/Success → Teal */
  [data-theme="dark"] .bg-emerald-50{background:#013331!important}
  [data-theme="dark"] .bg-emerald-100{background:#014A47!important}
  [data-theme="dark"] .bg-emerald-500{background:#03DAC6!important}
  [data-theme="dark"] .bg-emerald-900\/40{background:rgba(3,51,49,.8)!important}
  [data-theme="dark"] .text-emerald-300{color:#6EECE4!important}
  [data-theme="dark"] .text-emerald-400{color:#03DAC6!important}
  [data-theme="dark"] .text-emerald-600,[data-theme="dark"] .text-emerald-700{color:#03DAC6!important}
  [data-theme="dark"] .text-emerald-800,[data-theme="dark"] .text-emerald-900{color:#00B5A5!important}
  [data-theme="dark"] .border-emerald-200,[data-theme="dark"] .border-emerald-500{border-color:#03DAC6!important}
  /* Blue/Info → Primary Purple */
  [data-theme="dark"] .bg-blue-50{background:#2D2640!important}
  [data-theme="dark"] .bg-blue-100{background:#352E4A!important}
  [data-theme="dark"] .text-blue-600,[data-theme="dark"] .text-blue-700{color:#BB86FC!important}
  [data-theme="dark"] .border-blue-200{border-color:#3C3556!important}
  /* Purple */
  [data-theme="dark"] .bg-purple-100{background:#2D2640!important}
  [data-theme="dark"] .text-purple-700{color:#BB86FC!important}
  /* Yellow */
  [data-theme="dark"] .bg-yellow-50{background:#332B00!important}
  [data-theme="dark"] .text-yellow-800{color:#FFD54F!important}
  [data-theme="dark"] .border-yellow-400{border-color:#5C4700!important}
  /* Red/Error */
  [data-theme="dark"] .bg-red-50{background:#3C1420!important}
  [data-theme="dark"] .bg-red-900\/40{background:rgba(60,20,32,.8)!important}
  [data-theme="dark"] .text-red-300{color:#EF9A9A!important}
  [data-theme="dark"] .text-red-400{color:#CF6679!important}
  [data-theme="dark"] .text-red-600,[data-theme="dark"] .text-red-700{color:#CF6679!important}
  [data-theme="dark"] .text-red-800{color:#C0525F!important}
  [data-theme="dark"] .border-red-200{border-color:#6B2030!important}
  /* Extra bg overrides */
  [data-theme="dark"] .bg-\[\#fffbeb\]{background:#332B00!important}
  [data-theme="dark"] .bg-slate-50,[data-theme="dark"] .bg-slate-100{background:#1E1E1E!important}

  /* ── Print ── */
  @media print{
    .no-print{display:none!important}
    body{background:white}
    .print-area{padding:0!important;margin:0!important}
  }
</style>
</head>
<body>

<div class="min-h-screen flex">
  <!-- SIDEBAR -->
  <aside class="no-print w-64 bg-[var(--c-navy)] text-white flex-shrink-0 flex flex-col" style="min-height:100vh">
    <div class="p-5 border-b border-white/10">
      <div class="flex items-center gap-2">
        <div class="w-10 h-10 bg-[var(--c-accent)] rounded-xl flex items-center justify-center">
          <i data-lucide="truck" class="w-5 h-5 text-[var(--c-navy)]"></i>
        </div>
        <div>
          <div class="display text-lg font-bold leading-tight">RutePlanner</div>
          <div class="text-xs text-white/50">v2.0 - Map + AutoRoute</div>
        </div>
      </div>
    </div>
    <nav id="nav" class="flex-1 p-3 space-y-1 overflow-y-auto scrollbar text-sm">
      <div class="px-3 py-2 text-[10px] font-bold text-white/40 uppercase tracking-wider">Operasional</div>
      <button data-view="dashboard" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="layout-dashboard" class="w-4 h-4 icon"></i><span>Dashboard</span>
      </button>
      <button data-view="suratjalan" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="file-text" class="w-4 h-4 icon"></i><span>Surat Jalan</span>
        <span id="sjBadge" class="ml-auto text-[9px] px-1.5 py-0.5 rounded-full bg-amber-400 text-black font-bold hidden">0</span>
      </button>
      <button data-view="planning" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="route" class="w-4 h-4 icon"></i><span>Perencanaan Rute</span>
      </button>
      <button data-view="history" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="history" class="w-4 h-4 icon"></i><span>Riwayat Rencana</span>
      </button>
      <button data-view="kpi" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="bar-chart-2" class="w-4 h-4 icon"></i><span>KPI & Produktivitas</span>
      </button>

      <div class="px-3 py-2 mt-4 text-[10px] font-bold text-white/40 uppercase tracking-wider">Master Data</div>
      <button data-view="customers" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="users" class="w-4 h-4 icon"></i><span>Pelanggan</span>
      </button>
      <button data-view="vehicles" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="truck" class="w-4 h-4 icon"></i><span>Kendaraan</span>
      </button>
      <button data-view="drivers" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="user-cog" class="w-4 h-4 icon"></i><span>Sopir & Helper</span>
      </button>
      <button data-view="areas" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="map" class="w-4 h-4 icon"></i><span>Wilayah</span>
      </button>

      <div class="px-3 py-2 mt-4 text-[10px] font-bold text-white/40 uppercase tracking-wider">Sistem</div>
      <button data-view="settings" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="settings" class="w-4 h-4 icon"></i><span>Pengaturan</span>
      </button>
      <button data-view="backup" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="database" class="w-4 h-4 icon"></i><span>Backup & Restore</span>
      </button>
      <button data-view="colors" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="palette" class="w-4 h-4 icon"></i><span>Tema Warna</span>
      </button>
      <button data-view="ai" class="nav-item w-full flex items-center gap-2 px-3 py-2 rounded-lg text-left">
        <i data-lucide="bot" class="w-4 h-4 icon"></i>
        <span>AI Manajer</span>
        <span class="ml-auto text-[9px] px-1.5 py-0.5 rounded-full bg-[var(--c-secondary)] text-black font-bold">AI</span>
      </button>
    </nav>
    <div class="p-3 border-t border-white/10 text-xs text-white/50">
      <button onclick="toggleTheme()" class="w-full flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-white/10 mb-2 text-white/70 transition-all">
        <i id="themeIcon" data-lucide="moon" class="w-3.5 h-3.5"></i>
        <span id="themeLabel">Mode Gelap</span>
      </button>
      <button onclick="exportToExcel()" class="w-full flex items-center gap-2 px-2 py-2 rounded-lg hover:bg-white/10 mb-2 text-white/70 transition-all">
        <i data-lucide="file-spreadsheet" class="w-3.5 h-3.5"></i>
        <span>Export Excel</span>
      </button>
      <div>Data tersimpan di browser</div>
      <div class="mt-1">© 2026 Ahmat - Tangerang</div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="flex-1 overflow-y-auto print-area" style="max-width:calc(100vw - 16rem)">
    <div id="view" class="p-6 md:p-8"></div>
  </main>
</div>

<!-- MODAL -->
<div id="modal" class="hidden fixed inset-0 z-50 modal-bg flex items-center justify-center p-4">

function loadDB(){
  try {
    const raw = localStorage.getItem(DB_KEY);
    if (raw) return _migrateDB(JSON.parse(raw));
    // Coba migrate dari v1
    const rawV1 = localStorage.getItem(DB_KEY_V1);
    if (rawV1) {
      const v1 = JSON.parse(rawV1);
      const merged = JSON.parse(JSON.stringify(DEFAULT_DB));
      // Bawa data user dari v1
      if (v1.settings) merged.settings = {...merged.settings, ...v1.settings};
      if (Array.isArray(v1.customers)) merged.customers = v1.customers;
      if (Array.isArray(v1.plans)) merged.plans = v1.plans;
      if (Array.isArray(v1.vehicles) && v1.vehicles.length) merged.vehicles = v1.vehicles;
      if (Array.isArray(v1.drivers) && v1.drivers.length) merged.drivers = v1.drivers;
      if (Array.isArray(v1.areas) && v1.areas.length) merged.areas = v1.areas;
      return _migrateDB(merged);
    }
  } catch(e){console.error(e)}
  return JSON.parse(JSON.stringify(DEFAULT_DB));
}
function _migrateDB(d){
  // Ensure rings array exists (migrate old saves)
  if (!Array.isArray(d.rings) || d.rings.length === 0)
    d.rings = JSON.parse(JSON.stringify(DEFAULT_DB.rings));
  // Ensure suratJalan array exists
  if (!Array.isArray(d.suratJalan)) d.suratJalan = [];
  // Ensure each customer has a lokasi[] array (multi-address support)
  if (Array.isArray(d.customers)) {
    d.customers.forEach(c=>{
      if (!Array.isArray(c.lokasi)) c.lokasi = [];
      // If customer has legacy single-address fields but no lokasi entry, migrate
      if (c.lokasi.length === 0 && (c.alamat || c.alamatLengkap || (c.lat && c.lng))) {
        c.lokasi.push({
          id: uid(),
          label: 'Alamat Utama',
          alamat: c.alamatLengkap || c.alamat || '',
          lat: c.lat || null,
          lng: c.lng || null,
          isPrimary: true
        });
      }
    });
  }
  // Ensure each area has a zona (auto-assign from rings by distance)
  d.areas.forEach(a=>{
    if (!a.zona){
      const match = d.rings.slice().sort((x,y)=>y.maxJarak-x.maxJarak)
        .find(r=>a.jarakEstimasi <= r.maxJarak);
      a.zona = match ? match.id : (d.rings[d.rings.length-1]||{id:'other'}).id;
    }
  });
  return d;
}

const fmtRp = n => 'Rp ' + (Math.round(n||0)).toLocaleString('id-ID');
const fmtNum = n => (n||0).toLocaleString('id-ID');
const fmtDate = d => {
  if(!d) return '-';
  const dt = new Date(d);
  return dt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'});
};

function formatDuration(menit){
  if (!menit && menit !== 0) return '-';
  menit = Math.round(menit);
  const j = Math.floor(menit/60);
  const m = menit%60;
  if (j === 0) return `${m} mnt`;
  if (m === 0) return `${j} jam`;
  return `${j} jam ${m} mnt`;
}

function addMinutesToTime(hhmm, mins){
  if (!hhmm) return '';
  const [h,m] = hhmm.split(':').map(Number);
  const total = h*60 + m + Math.round(mins);
  const nh = Math.floor((total/60)%24);
  const nm = total%60;
  return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
}

/* =========================================================
   GEOCODING + ROUTING (Free OpenStreetMap stack)
   ========================================================= */
async function geocode(query){
  if (!query || !query.trim()) return [];
  const url = `https://nominatim.openstreetmap.org/search?format=json&countrycodes=id&limit=8&addressdetails=1&q=${encodeURIComponent(query)}`;
  try {
    const res = await fetch(url, {headers:{'Accept':'application/json'}});
    if (!res.ok) return [];
    const data = await res.json();
    return data.map(d => ({
      lat: parseFloat(d.lat),
      lng: parseFloat(d.lon),
      label: d.display_name,
      type: d.type
    }));
  } catch(e){
    console.error('Geocode error:', e);
    return [];
  }
}

async function reverseGeocode(lat, lng){
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18`;
    const res = await fetch(url);
    const data = await res.json();
    return data.display_name || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  } catch(e){
    return `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  }
}

// OSRM "trip" API = TSP solver (round-trip optimization)
async function osrmTrip(coords, opts={}){
  if (coords.length < 2) throw new Error('Minimal 2 titik');
  // OSRM accepts max ~100 coords on demo server
  const coordStr = coords.map(c=>`${c.lng},${c.lat}`).join(';');
  const roundtrip = opts.roundtrip !== false ? 'true' : 'false';
  const url = `https://router.project-osrm.org/trip/v1/driving/${coordStr}?source=first&destination=${opts.roundtrip!==false?'last':'last'}&roundtrip=${roundtrip}&overview=full&geometries=geojson`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Routing service tidak respon');
  const data = await res.json();
  if (data.code !== 'Ok') throw new Error(data.message || 'Routing gagal');
  return data;
}

/* =========================================================
   CALC ENGINE
   ========================================================= */
function calcPlanCost(plan){
  const s = db.settings;
  const v = db.vehicles.find(x=>x.id===plan.vehicleId);
  const sopir = db.drivers.find(x=>x.id===plan.sopirId);
  const helpers = (plan.helperIds||[]).map(id=>db.drivers.find(x=>x.id===id)).filter(Boolean);

  let totalKm = plan.kmOverride;
  let drivingMenit = 0, serviceMenit = 0, bufferMenit = 0, totalMenit = 0;
  let jamBerangkat = '', jamPulang = '';
  let isOptimized = false;

  // Prioritas: data dari auto-route
  if (plan.autoRoute && plan.autoRoute.totalKm) {
    totalKm = Math.round(plan.autoRoute.totalKm);
    drivingMenit = plan.autoRoute.drivingMenit || 0;
    serviceMenit = plan.autoRoute.serviceMenit || 0;
    bufferMenit = plan.autoRoute.bufferMenit || 0;
    totalMenit = plan.autoRoute.totalMenit || 0;
    jamBerangkat = plan.autoRoute.jamBerangkat || s.jamMulaiKerja;
    jamPulang = plan.autoRoute.jamPulang || '';
    isOptimized = !!plan.autoRoute.optimized;
  } else if (!totalKm || totalKm <= 0) {
    // Fallback estimasi area-based
    const distances = (plan.stops||[]).map(st=>{
      const a = db.areas.find(ar=>ar.id===st.areaId);
      return a?a.jarakEstimasi:0;
    });
    const maxD = Math.max(0, ...distances);
    const sumD = distances.reduce((a,b)=>a+b,0);
    totalKm = maxD * 2 + (sumD - maxD) * 0.3;
    totalKm = Math.round(totalKm);
    // Perkiraan waktu kasar
    drivingMenit = totalKm / (s.kecepatanRataKmJam||35) * 60;
    serviceMenit = (plan.stops||[]).reduce((a,st)=>a+(st.serviceMenit||s.serviceTimePerStopMenit||20),0);
    bufferMenit = s.bufferRouteMenit || 30;
    totalMenit = drivingMenit + serviceMenit + bufferMenit;
    jamBerangkat = s.jamMulaiKerja || '08:00';
    jamPulang = addMinutesToTime(jamBerangkat, totalMenit);
  }

  const kmPerL = (v && v.kmPerLiter) || s.kmPerLiter || 8;
  const liter = totalKm / kmPerL;
  const biayaSolar = liter * s.hargaSolar;

  const gajiSopir = sopir ? sopir.gajiHarian : 0;
  const gajiHelpers = helpers.reduce((a,h)=>a+h.gajiHarian,0);

  const lemburJam = plan.lemburJam || 0;
  const rateLemburSopir = (sopir && sopir.rateLembur) ? sopir.rateLembur : (s.rateLemburPerJam||0);
  const biayaLembur = lemburJam * (rateLemburSopir + helpers.reduce((a,h)=>a+(h.rateLembur||s.rateLemburPerJam||0),0));

  const biayaLain = plan.biayaLain || 0;

  const total = biayaSolar + gajiSopir + gajiHelpers + biayaLembur + biayaLain;

  // Override jam manual (untuk KPI tanpa GPS)
  if (plan.jamBerangkatPlan) jamBerangkat = plan.jamBerangkatPlan;
  if (plan.jamPulangPlan) jamPulang = plan.jamPulangPlan;

  return {
    totalKm, liter, biayaSolar,
    gajiSopir, gajiHelpers, jumlahHelper: helpers.length,
    lemburJam, biayaLembur, biayaLain, total,
    drivingMenit, serviceMenit, bufferMenit, totalMenit,
    jamBerangkat, jamPulang, isOptimized
  };
}

function calcTotalNotaStop(stop){
  return (stop.nota||[]).reduce((s,n)=>{
    if (n.items) return s + n.items.reduce((a,i)=>a+(i.nominal||0),0);
    return s + (n.nominal||0); // legacy flat structure
  },0);
}
function calcTotalNota(plan){
  return (plan.stops||[]).reduce((s,st)=>s+calcTotalNotaStop(st),0);
}

function calcPlanEstimates(plan){
  const s = db.settings;
  const v = db.vehicles.find(x=>x.id===plan.vehicleId);
  const kmPerL = (v && v.kmPerLiter) || s.kmPerLiter || 8;
  const serviceMinutPerStop = (plan.stops||[]).reduce((a,st)=>a+(st.serviceMenit||s.serviceTimePerStopMenit||20),0);
  const bufferMenit = s.bufferRouteMenit || 30;

  // Manual / area-based
  const distances = (plan.stops||[]).map(st=>{ const a=db.areas.find(ar=>ar.id===st.areaId); return a?a.jarakEstimasi:0; });
  const maxD = Math.max(0,...distances);
  const sumD = distances.reduce((a,b)=>a+b,0);
  const kmManual = Math.round(maxD*2+(sumD-maxD)*0.3);
  const drivingMinManual = kmManual/(s.kecepatanRataKmJam||35)*60;
  const totalMinManual = drivingMinManual + serviceMinutPerStop + bufferMenit;
  const jamStartManual = s.jamMulaiKerja||'08:00';

  const manual = {
    km: kmManual, liter: kmManual/kmPerL,
    drivingMenit: drivingMinManual, serviceMenit: serviceMinutPerStop,
    bufferMenit, totalMenit: totalMinManual,
    jamBerangkat: jamStartManual, jamPulang: addMinutesToTime(jamStartManual, totalMinManual)
  };

  // Auto-route (only if data exists)
  let auto = null;
  if (plan.autoRoute && plan.autoRoute.totalKm) {
    const kmAuto = Math.round(plan.autoRoute.totalKm);
    const drivingMinAuto = plan.autoRoute.drivingMenit||0;
    const serviceMinAuto = plan.autoRoute.serviceMenit||serviceMinutPerStop;
    const bufAuto = plan.autoRoute.bufferMenit||bufferMenit;
    const totalMinAuto = plan.autoRoute.totalMenit||(drivingMinAuto+serviceMinAuto+bufAuto);
    const jamStartAuto = plan.autoRoute.jamBerangkat||s.jamMulaiKerja;
    auto = {
      km: kmAuto, liter: kmAuto/kmPerL,
      drivingMenit: drivingMinAuto, serviceMenit: serviceMinAuto,
      bufferMenit: bufAuto, totalMenit: totalMinAuto,
      jamBerangkat: jamStartAuto,
      jamPulang: plan.autoRoute.jamPulang||addMinutesToTime(jamStartAuto,totalMinAuto),
      optimized: !!plan.autoRoute.optimized
    };
  }

  return { manual, auto };
}

/* =========================================================
   VIEW: DASHBOARD
   ========================================================= */
function renderDashboard(){
  const plans = db.plans;
  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);
  const filterMonth = window._dashMonth || thisMonth;

  const todayPlans = plans.filter(p=>p.tanggal===today);
  const monthPlans = plans.filter(p=>(p.tanggal||'').startsWith(filterMonth));
  const monthCost = monthPlans.reduce((s,p)=>s+calcPlanCost(p).total,0);
  const monthNota = monthPlans.reduce((s,p)=>s+calcTotalNota(p),0);
  const activeVehicles = db.vehicles.filter(v=>v.status==='aktif').length;
  const optimizedCount = monthPlans.filter(p=>p.autoRoute && p.autoRoute.optimized).length;
  const withReal = monthPlans.filter(p=>p.realisasi&&p.realisasi.pulang);
  // KPI scores this month
  const kpiScores = withReal.map(p=>{
    const c = calcPlanCost(p);
    if (!c.jamPulang||!p.realisasi.pulang) return null;
    const [ph,pm]=c.jamPulang.split(':').map(Number);
    const [rh,rm]=p.realisasi.pulang.split(':').map(Number);
    const dev=(rh*60+rm)-(ph*60+pm);
    return Math.max(0,Math.round(100-Math.max(0,dev/3)));
  }).filter(x=>x!==null);
  const avgKPI = kpiScores.length ? Math.round(kpiScores.reduce((a,b)=>a+b,0)/kpiScores.length) : null;

  // Exp doc warnings
  const expWarn = db.vehicles.filter(v=>{

function toggleHelper(id, checked){
  const p = window._currentPlan;
  if (checked) {
    if (!p.helperIds.includes(id)) p.helperIds.push(id);
  } else {
    p.helperIds = p.helperIds.filter(x=>x!==id);
  }
  refreshSummary();
}

function removeStop(stopId){
  const p = window._currentPlan;
  p.stops = p.stops.filter(s=>s.id!==stopId);
  // Invalidate auto-route jika ada stop yang dihapus
  if (p.autoRoute) {
    p.autoRoute = null;
    toast('Auto-Route dibatalkan (stop berubah)','info');
  }
  refreshStopsList();
  refreshSummary();
  renderRouteMap();
}

function moveStop(stopId, direction){
  const p = window._currentPlan;
  const idx = p.stops.findIndex(s=>s.id===stopId);
  if (idx<0) return;
  const newIdx = idx + direction;
  if (newIdx<0 || newIdx>=p.stops.length) return;
  [p.stops[idx], p.stops[newIdx]] = [p.stops[newIdx], p.stops[idx]];
  // Reorder manual = invalidate auto route
  if (p.autoRoute) {
    p.autoRoute.optimized = false;
  }
  refreshStopsList();
  renderRouteMap();
}

function updateStopField(stopId, field, value){
  const p = window._currentPlan;
  const s = p.stops.find(x=>x.id===stopId);
  if (s) {
    s[field] = value;
    refreshSummary();
  }
}

function _editStopInitMap(candidates){
  const s = db.settings;
  const start = window._editStop;
  const lat0 = start.lat || s.gudangLat || -5.1477;
  const lng0 = start.lng || s.gudangLng || 119.4327;
  const map = L.map('esMap').setView([lat0,lng0], start.lat?15:12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {maxZoom:19, attribution:'© OSM © CARTO'}).addTo(map);
  window._modalMap = map;
  if (s.gudangLat && s.gudangLng) {
    const ico = L.divIcon({html:'<div class="warehouse-marker"><i data-lucide="warehouse"></i></div>',
      className:'', iconSize:[34,34], iconAnchor:[17,17]});
    L.marker([s.gudangLat,s.gudangLng], {icon:ico}).addTo(map).bindPopup('Gudang');
  }
  candidates.forEach(c=>{
    L.circleMarker([c.lat,c.lng], {radius:6, color:'#03DAC6', fillColor:'#03DAC6', fillOpacity:0.6, weight:2})
      .bindPopup(`<strong>${c.label||'Alamat'}</strong><br>${c.alamat||''}`).addTo(map);
  });
  let pin = null;
  if (start.lat && start.lng) {
    pin = L.marker([start.lat, start.lng], {draggable:true}).addTo(map);
    pin.on('dragend', ev=>{
      const ll = ev.target.getLatLng();
      _editStopSetCoord(ll.lat, ll.lng);
    });
  }
  const setPin = async (lat,lng,addr) => {
    if (pin) pin.remove();
    pin = L.marker([lat,lng], {draggable:true}).addTo(map);
    pin.on('dragend', ev=>{
      const ll = ev.target.getLatLng();
      _editStopSetCoord(ll.lat, ll.lng);
    });
    _editStopSetCoord(lat,lng);
    if (addr) {
      document.getElementById('esAlamat').value = addr;
      window._editStop.alamat = addr;
    } else if (!document.getElementById('esAlamat').value) {
      const got = await reverseGeocode(lat,lng);
      document.getElementById('esAlamat').value = got;
      window._editStop.alamat = got;
    }
  };
  window._editStopSetPin = setPin;
  map.on('click', e=>{ setPin(e.latlng.lat, e.latlng.lng); });
  setTimeout(()=>map.invalidateSize(), 200);
}

function _editStopSetCoord(lat,lng){
  window._editStop.lat = lat;
  window._editStop.lng = lng;
  const latEl = document.getElementById('esLat');
  const lngEl = document.getElementById('esLng');
  if (latEl) latEl.value = lat.toFixed(6);
  if (lngEl) lngEl.value = lng.toFixed(6);
}

function _editStopSplitPaste(){
  const latEl = document.getElementById('esLat');
  const lngEl = document.getElementById('esLng');
  if (!latEl) return;
  const m = latEl.value.match(/^\s*(-?\d+\.?\d*)\s*[,;\s]+\s*(-?\d+\.?\d*)\s*$/);
  if (m) {
    latEl.value = m[1];
    lngEl.value = m[2];
    const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
    if (!isNaN(lat) && !isNaN(lng) && window._editStopSetPin) {
      window._modalMap.setView([lat,lng], 16);
      window._editStopSetPin(lat,lng, document.getElementById('esAlamat').value);
    }
  }
}

function _editStopPickLokasi(i){
  const stop = window._currentPlan.stops.find(x=>x.id===window._editStop.stopId);
  const cust = stop && stop.customerId && db.customers.find(c=>c.id===stop.customerId);
  const lokasiList = (cust?.lokasi || []).filter(l=>l.lat && l.lng);
  const l = lokasiList[i];
  if (!l) return;
  document.getElementById('esAlamat').value = l.alamat || '';
  window._editStop.alamat = l.alamat || '';
  if (window._editStopSetPin) {
    window._modalMap.setView([l.lat, l.lng], 16);
    window._editStopSetPin(l.lat, l.lng, l.alamat);
  }
}

async function _editStopMapSearch(){
  const q = document.getElementById('esMapSearch').value.trim();
  if (!q) return;
  const r = document.getElementById('esMapResults');
  r.classList.remove('hidden');
  r.innerHTML = '<div class="p-2 text-slate-500"><span class="spinner"></span> Cari...</div>';
  const results = await geocode(q);
  if (results.length === 0) { r.innerHTML='<div class="p-2 text-slate-500">Tidak ada hasil</div>'; return; }
  r.innerHTML = results.map(re=>`
    <div class="search-result-item" onclick="_editStopPickSearch(${re.lat},${re.lng},'${(re.label||'').replace(/'/g,'&#39;')}')">${re.label}</div>
  `).join('');
}
function _editStopPickSearch(lat,lng,label){
  if (window._editStopSetPin) {
    window._modalMap.setView([lat,lng], 16);
    window._editStopSetPin(lat,lng,label);
  }
  document.getElementById('esMapResults').classList.add('hidden');
}

function _saveStopEdit(){
  const ctx = window._editStop;
  if (!ctx) return;
  const p = window._currentPlan;
  const s = p.stops.find(x=>x.id===ctx.stopId);
  if (!s) return;

  const nama = document.getElementById('esNama').value.trim();
  if (!nama) return toast('Nama wajib diisi','error');
  const lat = parseFloat(document.getElementById('esLat').value);
  const lng = parseFloat(document.getElementById('esLng').value);
  const alamat = document.getElementById('esAlamat').value.trim();
  const areaId = document.getElementById('esArea').value;
  const serv = parseFloat(document.getElementById('esServ').value) || 0;
  const noSJ = document.getElementById('esNoSJ').value.trim();
  const saveToCust = document.getElementById('esSaveToCust')?.checked;

  s.customerNama = nama;
  s.alamat = alamat;
  s.areaId = areaId;
  s.serviceMenit = serv;
  s.noSuratJalan = noSJ;
  s.lat = isNaN(lat) ? null : lat;
  s.lng = isNaN(lng) ? null : lng;

  // Save coord as additional lokasi if requested
  if (saveToCust && s.customerId && s.lat && s.lng) {
    const cust = db.customers.find(c=>c.id===s.customerId);
    if (cust) {
      if (!Array.isArray(cust.lokasi)) cust.lokasi = [];
      const dup = cust.lokasi.find(l => l.lat && l.lng
        && Math.abs(l.lat - s.lat) < 1e-6
        && Math.abs(l.lng - s.lng) < 1e-6);
      if (!dup) {
        cust.lokasi.push({
          id: uid(),
          label: 'Edit Stop ' + new Date().toISOString().slice(0,10),
          alamat,
          lat: s.lat, lng: s.lng
        });
      }
      if (!cust.lat || !cust.lng) { cust.lat = s.lat; cust.lng = s.lng; }
    }
  }

  if (p.autoRoute) p.autoRoute = null; // re-route needed
  window._editStop = null;
  closeModal();
  refreshStopsList();
  refreshSummary();
  renderRouteMap();
  toast('Titik diperbarui ✓');
}

function renderRouteMap(){
  const p = window._currentPlan;
  const c = document.getElementById('routeMapContainer');
  if (!c) return;

  // Bersihkan map lama
  if (window._planMap) { try{window._planMap.remove();}catch(e){} window._planMap = null; }

  if (p.stops.length === 0) {
    c.innerHTML = '';
    return;
  }

  c.innerHTML = `<div class="text-xs text-slate-500 mb-2 flex items-center gap-2">
    <i data-lucide="map" class="w-3 h-3"></i> Preview rute (gudang → titik 1 → 2 → ... → gudang)
  </div>
  <div id="routeMap" class="map-container map-route"></div>`;
  lucide.createIcons();

  setTimeout(()=>{
    const s = db.settings;
    const map = L.map('routeMap');
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      maxZoom: 19,
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/attributions">CARTO</a>'
    }).addTo(map);
    window._planMap = map;

    const points = [];
    // Gudang
    if (s.gudangLat && s.gudangLng) {
      const ico = L.divIcon({
        html: '<div class="warehouse-marker"><i data-lucide="warehouse"></i></div>',
        className: '', iconSize:[34,34], iconAnchor:[17,17]
      });
      L.marker([s.gudangLat, s.gudangLng], {icon: ico})
        .addTo(map).bindPopup('<b>Gudang:</b> '+(s.gudangNama||'Gudang'));
      points.push([s.gudangLat, s.gudangLng]);
    }

    // Stops
    p.stops.forEach((st,i)=>{
      if (st.lat && st.lng) {
        const ico = L.divIcon({
          html: `<div class="stop-num-marker">${i+1}</div>`,
          className:'', iconSize:[30,30], iconAnchor:[15,15]
        });
        L.marker([st.lat, st.lng], {icon: ico})
          .addTo(map).bindPopup(`<b>${i+1}. ${st.customerNama||'-'}</b><br>${st.alamat||''}`);
        points.push([st.lat, st.lng]);
      }
    });

    // Polyline route (jika ada hasil OSRM)
    if (p.autoRoute && p.autoRoute.geometry && p.autoRoute.geometry.coordinates) {
      const coords = p.autoRoute.geometry.coordinates.map(c=>[c[1], c[0]]);
      L.polyline(coords, {color:'#0b1220', weight:5, opacity:.8}).addTo(map);
      L.polyline(coords, {color:'#f59e0b', weight:2.5, opacity:.9, dashArray:'8,8'}).addTo(map);
    } else if (points.length >= 2) {
      L.polyline(points.concat([points[0]]), {color:'#94a3b8', weight:2, dashArray:'5,8', opacity:.7}).addTo(map);
    }

    if (points.length > 0) {
      map.fitBounds(points, {padding:[40,40]});
    } else {
      map.setView([s.gudangLat||-5.1477, s.gudangLng||119.4327], 11);
    }

    // Re-render lucide icons inside map markers
    setTimeout(()=>lucide.createIcons(), 100);
  }, 50);
}

      </div>
      ${Object.keys(groups).length>0?`<div class="space-y-1 mb-2 max-h-28 overflow-y-auto scrollbar">
        ${Object.entries(groups).map(([nota,its])=>`
          <div class="bg-slate-50 rounded border border-[var(--c-line)] text-xs px-2 py-1">
            <div class="font-semibold text-slate-700">${nota||'(no nota)'} <span class="text-amber-700">${fmtRp(its.reduce((a,x)=>a+x.nominal,0))}</span></div>
            ${its.map(it=>`<div class="flex items-center gap-1 pl-2 text-slate-500">
              <span class="flex-1 truncate">${it.namaBarang}</span>
              <span class="flex-shrink-0">${fmtRp(it.nominal)}</span>
              <button onclick="_removePendingNota(${it._i});renderPendingNotaBox('${targetId}')" class="text-red-400 ml-1">✕</button>
            </div>`).join('')}
          </div>`).join('')}
      </div>`:''}
      <div class="grid grid-cols-3 gap-1.5 mb-1.5">
        <input id="pn_no" class="input text-xs py-1" placeholder="No. Nota">
        <input id="pn_nama" class="input text-xs py-1" placeholder="Nama barang *">
        <input type="number" id="pn_nom" class="input text-xs py-1" placeholder="Nominal" onkeyup="if(event.key==='Enter'){_addPendingNota();renderPendingNotaBox('${targetId}')}">
      </div>
      <button onclick="_addPendingNota();renderPendingNotaBox('${targetId}')" class="btn-info px-3 py-1 rounded text-xs flex items-center gap-1">
        <i data-lucide="plus" class="w-3 h-3"></i> Tambah Barang
      </button>
    </div>`;
  lucide.createIcons();
}
function _addPendingNota(){
  const nama=(document.getElementById('pn_nama')?.value||'').trim();
  const nominal=parseFloat(document.getElementById('pn_nom')?.value)||0;
  if(!nama) return toast('Isi nama barang','error');
  if(nominal<=0) return toast('Isi nominal','error');
  if(!window._pendingNota) window._pendingNota=[];
  window._pendingNota.push({noNota:(document.getElementById('pn_no')?.value||'').trim(),namaBarang:nama,nominal});
}
function _removePendingNota(idx){ if(window._pendingNota) window._pendingNota.splice(idx,1); }
function _buildNotaFromPending(){
  const items=window._pendingNota||[];
  if(!items.length) return [];
  const map=new Map();
  items.forEach(it=>{ const k=it.noNota||''; if(!map.has(k)) map.set(k,{id:uid(),noNota:k,items:[]}); map.get(k).items.push({id:uid(),namaBarang:it.namaBarang,nominal:it.nominal}); });
  return Array.from(map.values());
}

function initAddStopMap(){

  const map = L.map('addStopMap').setView([s.gudangLat||-5.1477, s.gudangLng||119.4327], 12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/attributions">CARTO</a>'
  }).addTo(map);
  window._modalMap = map;

  // Marker gudang
  if (s.gudangLat && s.gudangLng) {
    const ico = L.divIcon({html:'<div class="warehouse-marker"><i data-lucide="warehouse"></i></div>', className:'', iconSize:[34,34], iconAnchor:[17,17]});
    L.marker([s.gudangLat, s.gudangLng], {icon:ico}).addTo(map).bindPopup('Gudang');
  }

  let pickMarker = null;
  map.on('click', async (e)=>{
    const {lat, lng} = e.latlng;
    _mapPickLat = lat; _mapPickLng = lng;
    if (pickMarker) pickMarker.remove();
    pickMarker = L.marker([lat,lng]).addTo(map);
    document.getElementById('mapPickInfo').classList.remove('hidden');
    document.getElementById('mapPickAddr').innerHTML = '<i class="spinner inline-block align-middle mr-1"></i> Mendapatkan alamat...';
    window._pendingNota = [];
    renderPendingNotaBox('pendingNotaBox');
    const addr = await reverseGeocode(lat, lng);
    _mapPickAddr = addr;
    document.getElementById('mapPickAddr').textContent = addr;
    lucide.createIcons();
  });

  setTimeout(()=>{ map.invalidateSize(); lucide.createIcons(); }, 200);
}

/* =========================================================
   AUTO-ROUTE (TSP via OSRM)
   ========================================================= */
async function runAutoRoute(){
  const p = window._currentPlan;
  const geoStops = p.stops.filter(s=>s.lat && s.lng);
  if (geoStops.length < 2) {
    return toast('Auto-Route butuh minimal 2 titik dengan koordinat (Geo)','error');
  }
  if (geoStops.length !== p.stops.length) {
    toast(`${p.stops.length-geoStops.length} titik tanpa koordinat akan diabaikan dari optimasi`,'info');
  }

  const s = db.settings;
  const gudang = {lat: s.gudangLat, lng: s.gudangLng};
  if (!gudang.lat || !gudang.lng) {
    return toast('Set lokasi gudang dulu di menu Pengaturan','error');
  }

  const btn = document.getElementById('btnAutoRoute');
  const btnText = document.getElementById('btnAutoRouteText');
  btn.disabled = true;
  btnText.innerHTML = '<span class="spinner"></span> Optimasi rute...';

  try {
    // Format: gudang, stops..., gudang (roundtrip)
    const coords = [gudang, ...geoStops.map(s=>({lat:s.lat,lng:s.lng}))];
    const result = await osrmTrip(coords, {roundtrip:true});

    if (!result.trips || !result.trips[0]) throw new Error('Tidak ada hasil');

    const trip = result.trips[0];
    const waypoints = result.waypoints;

    // waypoints[0] = gudang, sisanya = stops (index 1..N)
    // waypoints[i].waypoint_index = urutan dalam route
    // Reorder stops sesuai hasil optimasi
    const stopWaypoints = waypoints.slice(1).map((wp, idx) => ({
      origStop: geoStops[idx],
      waypointIndex: wp.waypoint_index
    }));
    stopWaypoints.sort((a,b) => a.waypointIndex - b.waypointIndex);
    const orderedStops = stopWaypoints.map(x=>x.origStop);

    // Update plan: stops yang punya geo diurutkan ulang, yang non-geo dipindah ke akhir
    const nonGeoStops = p.stops.filter(st => !st.lat || !st.lng);
    p.stops = [...orderedStops, ...nonGeoStops];

    const totalKm = trip.distance / 1000;
    const drivingMenit = trip.duration / 60;
    const serviceMenit = p.stops.length * (s.serviceTimePerStopMenit||20);
    const bufferMenit = s.bufferRouteMenit || 30;
    const totalMenit = drivingMenit + serviceMenit + bufferMenit;
    const jamBerangkat = s.jamMulaiKerja || '08:00';
    const jamPulang = addMinutesToTime(jamBerangkat, totalMenit);

    p.autoRoute = {
      totalKm,
      drivingMenit,
      serviceMenit,
      bufferMenit,
      totalMenit,
      jamBerangkat,
      jamPulang,
      optimized: true,
      geometry: trip.geometry,
      timestamp: new Date().toISOString()
    };

    refreshStopsList();
    refreshSummary();
    renderRouteMap();
    toast(`Auto-Route selesai! ${totalKm.toFixed(1)} km · ${formatDuration(drivingMenit)} di jalan`);
  } catch(e){
    console.error(e);
    toast('Auto-Route gagal: '+(e.message||'koneksi'),'error');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'Auto-Route';
  }
}

function savePlan(status){
  const p = window._currentPlan;
  if (!p.vehicleId) return toast('Pilih kendaraan dulu','error');
  if (!p.sopirId) return toast('Pilih sopir dulu','error');
  if (status==='planned' && p.stops.length===0) return toast('Tambahkan minimal 1 titik pengantaran','error');

  p.status = status;
  p.updatedAt = new Date().toISOString();

  const idx = db.plans.findIndex(x=>x.id===p.id);
  if (idx>=0) db.plans[idx] = p; else db.plans.push(p);
  saveDB();
  toast(status==='draft'?'Draft tersimpan':'Rencana dikonfirmasi & tersimpan');
  setTimeout(()=>setView('history'), 600);
}

function deletePlan(id){
  confirmDelete('Hapus rencana ini? Tindakan tidak bisa dibatalkan.', ()=>{
    db.plans = db.plans.filter(p=>p.id!==id);
    saveDB();
    toast('Rencana dihapus');
    setView('history');
  });
}

  const sopir = db.drivers.find(x=>x.id===p.sopirId);

      ${hasGeo ? `

        return `<div class="mb-6 p-3 rounded-lg border flex items-center gap-4 ${over?'bg-red-50 border-red-200':'bg-emerald-50 border-emerald-200'}">

      window._planMap = map;
      const points = [];

        const wIco = L.divIcon({html:'<div class="warehouse-marker"><i data-lucide="warehouse"></i></div>', className:'', iconSize:[34,34], iconAnchor:[17,17]});
        L.marker([st.gudangLat, st.gudangLng], {icon:wIco}).addTo(map).bindPopup('<b>Gudang:</b> '+(st.gudangNama||'Gudang'));
        points.push([st.gudangLat, st.gudangLng]);

      p.stops.forEach((s,i)=>{
        if (s.lat && s.lng) {
          const ico = L.divIcon({html:`<div class="stop-num-marker">${i+1}</div>`, className:'', iconSize:[30,30], iconAnchor:[15,15]});
          L.marker([s.lat, s.lng], {icon:ico}).addTo(map).bindPopup(`<b>${i+1}. ${s.customerNama}</b><br>${s.alamat||''}`);
          points.push([s.lat, s.lng]);
        }
      });
      if (p.autoRoute && p.autoRoute.geometry && p.autoRoute.geometry.coordinates) {
        const coords = p.autoRoute.geometry.coordinates.map(c=>[c[1],c[0]]);
        L.polyline(coords, {color:'#0b1220', weight:5, opacity:.8}).addTo(map);
        L.polyline(coords, {color:'#f59e0b', weight:2.5, opacity:.9, dashArray:'8,8'}).addTo(map);
      } else if (points.length >= 2) {
        L.polyline(points.concat([points[0]]), {color:'#94a3b8', weight:2, dashArray:'5,8', opacity:.7}).addTo(map);
      }
      if (points.length > 0) map.fitBounds(points, {padding:[40,40]});
      else map.setView([st.gudangLat||-5.1477, st.gudangLng||119.4327], 11);
      setTimeout(()=>lucide.createIcons(), 100);
    }, 100);
  }

  lucide.createIcons();
}

function _downloadCustTemplate(){
  const aoa = [
    ['Nama Pelanggan','Nama Toko','Telepon','Wilayah','Alamat','Latitude','Longitude','Label Alamat'],
    ['Contoh: PT Sumber Jaya','Toko Sumber Jaya','081234567890','Antang','Jl. Antang Raya No. 12','-5.1612','119.4750','Toko Utama'],
    ['Contoh: CV Berkah','','08221111111','Sungguminasa/Gowa','Jl. Poros Gowa No. 5','','',''],
    ['','','','','','',''],
  ];
  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols'] = [{wch:24},{wch:20},{wch:16},{wch:18},{wch:40},{wch:12},{wch:12},{wch:16}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Pelanggan');
  // Sheet 2: daftar wilayah supaya user tau pilihan
  const wsAreas = XLSX.utils.aoa_to_sheet([['Nama Wilayah','Deskripsi'], ...db.areas.map(a=>[a.nama,a.deskripsi||''])]);
  wsAreas['!cols'] = [{wch:24},{wch:36}];
  XLSX.utils.book_append_sheet(wb, wsAreas, 'Referensi Wilayah');
  XLSX.writeFile(wb, 'Template_Import_Pelanggan.xlsx');
  toast('Template di-download ✓');
}

function _parseCustExcel(wb){
  const sheetName = wb.SheetNames.find(n=>n.toLowerCase().includes('pelanggan')||n.toLowerCase().includes('customer'))
    || wb.SheetNames[0];
  const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {header:1, defval:''});
  if (rows.length < 2) return [];

  // Detect header row
  let hdrIdx = 0;
  for (let i=0; i<Math.min(5,rows.length); i++) {
    const s = rows[i].map(c=>String(c).toLowerCase()).join('|');
    if (s.includes('nama') && (s.includes('alamat')||s.includes('telp')||s.includes('lat'))) { hdrIdx=i; break; }
  }
  const hdr = rows[hdrIdx].map(h=>String(h).trim().toLowerCase());

  const findCol = (exactKeys, looseKeys, excludeKeys=[]) => {
    for (const k of exactKeys) { const i = hdr.findIndex(h=>h===k); if (i!==-1) return i; }
    for (const k of looseKeys) {
      const i = hdr.findIndex(h => h.includes(k) && !excludeKeys.some(ex=>h.includes(ex)));
      if (i!==-1) return i;
    }
    return -1;
  };

  const cNama   = findCol(['nama pelanggan','nama','customer','nama customer'], ['nama'], ['toko','barang']);
  const cToko   = findCol(['nama toko','toko','usaha'], ['toko','usaha']);
  const cTelp   = findCol(['telepon','telp','hp','no telp','phone','no. telp'], ['telp','telepon','hp','phone']);
  const cArea   = findCol(['wilayah','area','zona'], ['wilayah','area']);
  const cAlamat = findCol(['alamat','address'], ['alamat']);
  const cLat    = findCol(['latitude','lat'], ['lat']);
  const cLng    = findCol(['longitude','lng','lon','long'], ['lng','lon','long']);
  const cLabel  = findCol(['label alamat','label'], ['label']);

  if (cNama === -1) {
    throw new Error('Kolom "Nama Pelanggan" tidak ditemukan di file');
  }

  const out = [];
  for (let i=hdrIdx+1; i<rows.length; i++) {
    const r = rows[i];
    const nama = String(r[cNama]||'').trim();
    if (!nama) continue;
    const latRaw = cLat>=0 ? String(r[cLat]||'').replace(',','.').trim() : '';
    const lngRaw = cLng>=0 ? String(r[cLng]||'').replace(',','.').trim() : '';
    // Support "lat, lng" pasted into one cell
    let lat = parseFloat(latRaw), lng = parseFloat(lngRaw);
    if (!isNaN(lat) && isNaN(lng) && latRaw.includes(',')) {
      const parts = latRaw.split(/[,;\s]+/).map(p=>parseFloat(p));
      if (parts.length >= 2 && !isNaN(parts[0]) && !isNaN(parts[1])) { lat = parts[0]; lng = parts[1]; }
    }
    out.push({
      nama,
      toko:   cToko>=0   ? String(r[cToko]||'').trim() : '',
      telepon:cTelp>=0   ? String(r[cTelp]||'').trim() : '',
      areaNama: cArea>=0 ? String(r[cArea]||'').trim() : '',
      alamat: cAlamat>=0 ? String(r[cAlamat]||'').trim() : '',
      lat: isNaN(lat)?null:lat,
      lng: isNaN(lng)?null:lng,
      label: cLabel>=0   ? String(r[cLabel]||'').trim() : ''
    });
  }
  return out;
}

function importCustomersFromExcel(file){
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    let parsed;
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      parsed = _parseCustExcel(wb);
    } catch(err){
      console.error(err);
      return toast('Gagal baca file: '+err.message, 'error');
    }
    if (parsed.length === 0) return toast('Tidak ada baris pelanggan ditemukan', 'error');

    // Diff: yang baru vs yang sudah ada (match by nama, case-insensitive)
    const existingByName = new Map();
    (db.customers||[]).forEach(c => existingByName.set((c.nama||'').toLowerCase(), c));

    const summary = { create: [], update: [] };
    parsed.forEach(p => {
      const cust = existingByName.get(p.nama.toLowerCase());
      if (cust) summary.update.push({p, cust});
      else summary.create.push(p);
    });

    window._pendingCustImport = summary;

    const preview = parsed.slice(0,8).map(p=>`
      <tr>
        <td class="text-xs font-semibold">${p.nama}</td>
        <td class="text-xs">${p.toko||'-'}</td>
        <td class="text-xs">${p.telepon||'-'}</td>
        <td class="text-xs text-slate-500 truncate max-w-xs">${p.alamat||'-'}</td>
        <td class="text-xs">${p.lat&&p.lng?`<span class="text-emerald-600 font-mono">${p.lat.toFixed(3)}, ${p.lng.toFixed(3)}</span>`:'<span class="text-amber-600">-</span>'}</td>
        <td class="text-xs">${p.areaNama||'-'}</td>
      </tr>`).join('');
    const more = parsed.length>8 ? `<tr><td colspan="6" class="text-center text-xs text-slate-400 py-2">...dan ${parsed.length-8} baris lainnya</td></tr>` : '';

    openModal('Preview Import Pelanggan', `
      <div class="space-y-4">
        <div class="grid grid-cols-3 gap-3">
          <div class="p-3 bg-blue-50 rounded-xl text-center">
            <div class="text-2xl font-bold text-blue-700">${parsed.length}</div>
            <div class="text-xs text-slate-500">Total baris</div>
          </div>
          <div class="p-3 bg-emerald-50 rounded-xl text-center">
            <div class="text-2xl font-bold text-emerald-700">${summary.create.length}</div>
            <div class="text-xs text-slate-500">Pelanggan baru</div>
          </div>
          <div class="p-3 bg-amber-50 rounded-xl text-center">
            <div class="text-2xl font-bold text-amber-700">${summary.update.length}</div>
            <div class="text-xs text-slate-500">Update (nama sama)</div>
          </div>
        </div>
        <div class="overflow-x-auto">
          <table>
            <thead><tr>
              <th>Nama</th><th>Toko</th><th>Telp</th><th>Alamat</th><th>Lat/Lng</th><th>Wilayah</th>
            </tr></thead>
            <tbody>${preview}${more}</tbody>
          </table>
        </div>
        <div class="p-3 bg-blue-50 rounded-lg text-xs text-blue-900 flex gap-2">
          <i data-lucide="info" class="w-4 h-4 flex-shrink-0"></i>
          <div>
            <strong>Cara update:</strong> kalau nama pelanggan sama persis dengan yang sudah ada, alamat baru dari Excel akan ditambah sebagai <em>alamat tambahan</em> (tidak menimpa data lama). Lat/Lng/Telp yang kosong di DB akan diisi dari Excel.
          </div>
        </div>
      </div>
    `, `
      <button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal()">Batal</button>
      <button class="btn-primary px-4 py-2 rounded-lg" onclick="_confirmCustImport()">
        <i data-lucide="check" class="w-4 h-4 inline"></i> Simpan ${parsed.length} Pelanggan
      </button>
    `);
  };
  reader.readAsArrayBuffer(file);
}

function _confirmCustImport(){
  const sum = window._pendingCustImport;
  if (!sum) return;
  if (!Array.isArray(db.customers)) db.customers = [];

  // Helper: find area by case-insensitive name
  const findArea = (name) => {
    if (!name) return null;
    const n = name.toLowerCase();
    return db.areas.find(a => (a.nama||'').toLowerCase() === n)
        || db.areas.find(a => (a.nama||'').toLowerCase().includes(n) || n.includes((a.nama||'').toLowerCase()));
  };

  let created = 0, updated = 0, addedLokasi = 0;

  sum.create.forEach(p => {
    const area = findArea(p.areaNama);
    const lokasi = [];
    if (p.alamat || (p.lat && p.lng)) {
      lokasi.push({
        id: uid(),
        label: p.label || 'Alamat Utama',
        alamat: p.alamat||'',
        lat: p.lat||null,
        lng: p.lng||null
      });
    }
    db.customers.push({
      id: uid(),
      nama: p.nama,
      toko: p.toko,
      alamat: p.alamat,
      alamatLengkap: p.alamat,
      telepon: p.telepon,
      areaId: area?.id || db.areas[0]?.id || '',
      lat: p.lat, lng: p.lng,
      lokasi,
      autoCreated: false
    });
    created++;
  });

  sum.update.forEach(({p, cust}) => {
    if (!Array.isArray(cust.lokasi)) cust.lokasi = [];
    // Fill blanks
    if (!cust.telepon && p.telepon) cust.telepon = p.telepon;
    if (!cust.toko && p.toko) cust.toko = p.toko;
    if (!cust.lat && p.lat) cust.lat = p.lat;
    if (!cust.lng && p.lng) cust.lng = p.lng;
    if (!cust.alamat && p.alamat) cust.alamat = p.alamat;
    if (!cust.alamatLengkap && p.alamat) cust.alamatLengkap = p.alamat;
    if (p.areaNama) {
      const area = findArea(p.areaNama);
      if (area && !cust.areaId) cust.areaId = area.id;
    }
    // Add as additional lokasi if alamat/coord exists & not dup
    const has = !!(p.alamat || (p.lat && p.lng));
    if (has) {
      const dup = cust.lokasi.find(l =>
        (p.lat && p.lng && l.lat===p.lat && l.lng===p.lng) ||
        (p.alamat && (l.alamat||'').toLowerCase() === p.alamat.toLowerCase())
      );
      if (!dup) {
        cust.lokasi.push({
          id: uid(),
          label: p.label || ('Import '+new Date().toISOString().slice(0,10)),
          alamat: p.alamat,
          lat: p.lat || null,
          lng: p.lng || null
        });
        addedLokasi++;
      } else if (dup && !dup.lat && p.lat && p.lng) {
        // Fill missing coords on existing alamat
        dup.lat = p.lat; dup.lng = p.lng;
      }
    }
    updated++;
  });

  saveDB();
  window._pendingCustImport = null;
  closeModal();
  renderCustomers();
  toast(`Selesai · ${created} baru, ${updated} diperbarui${addedLokasi?', '+addedLokasi+' alamat baru':''} ✓`);
}

function _custDataStatus(c){
  // Returns { missing: [...], hasAnyGeo: bool, addressCount: n }
  const lokasi = c.lokasi || [];
  const hasGeoLegacy = !!(c.lat && c.lng);
  const hasGeoAny = hasGeoLegacy || lokasi.some(l=>l.lat && l.lng);
  const hasAddrAny = !!(c.alamat || c.alamatLengkap) || lokasi.some(l=>l.alamat);
  const missing = [];
  if (!hasAddrAny) missing.push('Alamat');
  if (!hasGeoAny) missing.push('Koordinat');
  if (!c.telepon) missing.push('Telepon');
  return {missing, hasGeoAny, hasAddrAny, addressCount: Math.max(lokasi.length, hasAddrAny?1:0)};
}

function _custDebouncedFilter(val){
  window._custFilterQ = val;
  clearTimeout(window._custFilterTimer);
  window._custFilterTimer = setTimeout(()=>{
    renderCustomers();
    const box = document.getElementById('custSearchBox');
    if (box) {
      box.focus();
      const len = box.value.length;
      try { box.setSelectionRange(len, len); } catch(e){}
    }
  }, 220);
}

function renderCustomers(){
  const q = (window._custFilterQ||'').toLowerCase();
  const filterStatus = window._custFilterStatus || 'all';

  let list = (db.customers||[]).slice();
  if (q) list = list.filter(c => (c.nama||'').toLowerCase().includes(q)
    || (c.toko||'').toLowerCase().includes(q)
    || (c.alamat||'').toLowerCase().includes(q)
    || (c.telepon||'').includes(q));
  if (filterStatus === 'incomplete') list = list.filter(c=>_custDataStatus(c).missing.length>0);
  if (filterStatus === 'geo') list = list.filter(c=>_custDataStatus(c).hasGeoAny);
  if (filterStatus === 'autoCreated') list = list.filter(c=>c.autoCreated);

  const totalGeo = (db.customers||[]).filter(c=>_custDataStatus(c).hasGeoAny).length;
  const totalIncomplete = (db.customers||[]).filter(c=>_custDataStatus(c).missing.length>0).length;
  const totalAuto = (db.customers||[]).filter(c=>c.autoCreated).length;

  document.getElementById('view').innerHTML = `
    <div class="mb-6 flex justify-between items-start flex-wrap gap-4">
      <div>
        <h1 class="display text-3xl font-bold">Master Pelanggan</h1>
        <p class="text-slate-500 text-sm mt-1">${(db.customers||[]).length} pelanggan · ${totalGeo} ber-geolokasi · ${totalIncomplete} data kurang</p>
      </div>
      <div class="flex gap-2">
        <button onclick="_downloadCustTemplate()" class="btn-secondary px-3 py-2 rounded-lg text-sm flex items-center gap-2" title="Download template Excel">
          <i data-lucide="file-down" class="w-4 h-4"></i> Template

function editCustomer(id){
  const c = id ? db.customers.find(x=>x.id===id) : {nama:'',toko:'',alamat:'',areaId:db.areas[0]?.id||'',telepon:'',lat:null,lng:null,lokasi:[]};
  if (!Array.isArray(c.lokasi)) c.lokasi = [];
  const isNew = !id;
  // Working copy of lokasi (so unsaved edits don't mutate db)
  window._custLokasi = JSON.parse(JSON.stringify(c.lokasi));
  window._custEditId = id || '';
  // Active lokasi index for editing on the map
  window._custActiveLok = c.lokasi.findIndex(l=>l.isPrimary);
  if (window._custActiveLok < 0 && c.lokasi.length>0) window._custActiveLok = 0;

  openModal(isNew?'Tambah Pelanggan':'Edit Pelanggan', `
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="space-y-3">
        <div><label class="label">Nama Pelanggan *</label><input id="cf_nama" class="input" value="${c.nama||''}"></div>
        <div><label class="label">Nama Toko / Usaha</label><input id="cf_toko" class="input" value="${c.toko||''}"></div>
        <div><label class="label">Wilayah</label>
          <select id="cf_area" class="input">
            ${db.areas.map(a=>`<option value="${a.id}" ${a.id===c.areaId?'selected':''}>${a.nama} (~${a.jarakEstimasi} km)</option>`).join('')}
          </select>
        </div>
        <div><label class="label">Telepon</label><input id="cf_tel" class="input" value="${c.telepon||''}"></div>

        <div class="border-t border-[var(--c-line)] pt-3">
          <div class="flex items-center justify-between mb-2">
            <span class="label mb-0">Alamat Pelanggan (boleh lebih dari satu)</span>
            <button onclick="_custAddLokasi()" class="btn-info px-2 py-1 rounded-lg text-xs flex items-center gap-1">
              <i data-lucide="plus" class="w-3 h-3"></i> Tambah
            </button>
          </div>
          <div id="custLokasiList" class="space-y-2 max-h-72 overflow-y-auto scrollbar"></div>
        </div>
      </div>

      <div>
        <div class="mb-2 flex gap-2">
          <input type="text" id="custMapSearch" class="input flex-1 text-sm" placeholder="Cari alamat..." onkeyup="if(event.key==='Enter')doCustomerMapSearch()">
          <button onclick="doCustomerMapSearch()" class="btn-primary px-3 py-2 rounded-lg text-xs"><i data-lucide="search" class="w-3 h-3"></i></button>
        </div>
        <div id="custMapResults" class="hidden border border-[var(--c-line)] rounded-lg mb-2 max-h-32 overflow-y-auto text-xs"></div>
        <div id="custMap" class="map-container map-small"></div>
        <p class="text-[10px] text-slate-400 mt-1">Klik peta untuk set koordinat alamat aktif (highlight kuning)</p>
      </div>
    </div>
  `, `
    <button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal()">Batal</button>
    <button class="btn-primary px-4 py-2 rounded-lg" onclick="saveCustomer('${id||''}')">Simpan</button>
  `);

  _renderCustLokasiList();
  const active = window._custLokasi[window._custActiveLok];
  setTimeout(()=>initCustomerMap(active?.lat, active?.lng), 100);
  lucide.createIcons();
}

function _renderCustLokasiList(){
  const list = window._custLokasi || [];
  const active = window._custActiveLok;
  const el = document.getElementById('custLokasiList');
  if (!el) return;
  if (list.length === 0) {
    el.innerHTML = `<div class="p-3 text-center text-slate-400 text-xs border border-dashed border-[var(--c-line)] rounded-lg">
      Belum ada alamat. Klik <strong>Tambah</strong>.
    </div>`;
    return;
  }
  el.innerHTML = list.map((l,i)=>{
    const isActive = i === active;
    return `
      <div class="border ${isActive?'border-[var(--c-accent)] bg-[var(--c-surface-var)]':'border-[var(--c-line)]'} rounded-lg p-2 space-y-1">
        <div class="flex gap-1 items-center">
          <input class="input text-xs flex-1" placeholder="Label (mis. Rumah, Toko)" value="${(l.label||'').replace(/"/g,'&quot;')}" oninput="window._custLokasi[${i}].label=this.value">
          <button onclick="_custSetActive(${i})" class="text-[10px] px-2 py-1 rounded ${isActive?'bg-[var(--c-accent)] text-white':'bg-[var(--c-surface-var)] hover:bg-[var(--c-accent)] hover:text-white'}" title="Edit di peta">
            <i data-lucide="map-pin" class="w-3 h-3"></i>
          </button>
          <button onclick="_custDelLokasi(${i})" class="text-[10px] px-2 py-1 rounded bg-red-50 text-red-600 hover:bg-red-100" title="Hapus">
            <i data-lucide="trash-2" class="w-3 h-3"></i>
          </button>
        </div>
        <input class="input text-xs" placeholder="Alamat" value="${(l.alamat||'').replace(/"/g,'&quot;')}" oninput="window._custLokasi[${i}].alamat=this.value">
        <div class="grid grid-cols-2 gap-1">
          <input class="input text-xs" placeholder="Lat" value="${l.lat||''}" oninput="window._custLokasi[${i}].lat=parseFloat(this.value)||null">
          <input class="input text-xs" placeholder="Lng" value="${l.lng||''}" oninput="window._custLokasi[${i}].lng=parseFloat(this.value)||null">
        </div>
      </div>`;
  }).join('');
  lucide.createIcons();
}

function _custAddLokasi(){
  if (!Array.isArray(window._custLokasi)) window._custLokasi = [];
  window._custLokasi.push({
    id: uid(),
    label: 'Alamat '+(window._custLokasi.length+1),
    alamat: '', lat:null, lng:null,
    isPrimary: window._custLokasi.length===0
  });
  window._custActiveLok = window._custLokasi.length-1;
  _renderCustLokasiList();
}

function _custDelLokasi(i){
  const was = window._custLokasi[i];
  window._custLokasi.splice(i,1);
  // Restore primary on first remaining if we deleted the primary
  if (was?.isPrimary && window._custLokasi.length>0) window._custLokasi[0].isPrimary = true;
  if (window._custActiveLok >= window._custLokasi.length) window._custActiveLok = window._custLokasi.length-1;
  _renderCustLokasiList();
  _custRefreshMapMarkers();
}

function _custSetActive(i){
  window._custActiveLok = i;
  _renderCustLokasiList();
  const l = window._custLokasi[i];
  if (l?.lat && l?.lng && window._modalMap) {
    window._modalMap.setView([l.lat, l.lng], 16);
  }
  _custRefreshMapMarkers();
}

function _custRefreshMapMarkers(){
  if (!window._modalMap) return;
  // Remove old markers
  (window._custMarkers||[]).forEach(m=>m.remove());
  window._custMarkers = [];
  const list = window._custLokasi || [];
  list.forEach((l,i)=>{
    if (l.lat && l.lng) {
      const isActive = i === window._custActiveLok;
      const m = L.circleMarker([l.lat, l.lng], {
        radius: isActive ? 9 : 6,
        color: isActive ? '#F59300' : (l.isPrimary ? '#03DAC6' : '#6200EE'),
        fillColor: isActive ? '#FFD54F' : (l.isPrimary ? '#03DAC6' : '#BB86FC'),
        fillOpacity: 0.8,
        weight: 2
      }).bindPopup(`<strong>${l.label||'Alamat'}</strong><br>${l.alamat||''}`).addTo(window._modalMap);
      window._custMarkers.push(m);
    }
  });
}

function initCustomerMap(initialLat, initialLng){
  const s = db.settings;
  const startLat = initialLat || s.gudangLat || -5.1477;
  const startLng = initialLng || s.gudangLng || 119.4327;
  const map = L.map('custMap').setView([startLat, startLng], initialLat?15:12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {maxZoom:19, attribution:'© OSM © CARTO'}).addTo(map);
  window._modalMap = map;
  window._custMarkers = [];
  _custRefreshMapMarkers();

  map.on('click', async e=>{
    const {lat, lng} = e.latlng;
    const i = window._custActiveLok;
    if (i == null || i < 0 || !window._custLokasi[i]) {
      _custAddLokasi();
    }
    const idx = window._custActiveLok;
    window._custLokasi[idx].lat = lat;
    window._custLokasi[idx].lng = lng;
    if (!window._custLokasi[idx].alamat) {
      const addr = await reverseGeocode(lat, lng);
      window._custLokasi[idx].alamat = addr;
    }
    _renderCustLokasiList();
    _custRefreshMapMarkers();
  });
  setTimeout(()=>map.invalidateSize(), 200);
}

async function doCustomerMapSearch(){
  const q = document.getElementById('custMapSearch').value;
  if (!q) return;
  const r = document.getElementById('custMapResults');
  r.classList.remove('hidden');
  r.innerHTML = '<div class="p-2 text-slate-500"><span class="spinner"></span> Cari...</div>';
  const results = await geocode(q);
  if (results.length === 0) {
    r.innerHTML = '<div class="p-2 text-slate-500">Tidak ada hasil</div>';
    return;
  }
  r.innerHTML = results.map(re=>`
    <div class="search-result-item" onclick="selectCustomerMapResult(${re.lat},${re.lng},'${(re.label||'').replace(/'/g,'&#39;')}')">
      <div class="text-xs">${re.label}</div>
    </div>
  `).join('');
}

function selectCustomerMapResult(lat, lng, label){
  // Apply to currently active lokasi (or create one if none)
  if (window._custActiveLok == null || window._custActiveLok < 0 || !window._custLokasi[window._custActiveLok]) {
    _custAddLokasi();
  }
  const idx = window._custActiveLok;
  window._custLokasi[idx].lat = lat;
  window._custLokasi[idx].lng = lng;
  if (!window._custLokasi[idx].alamat) window._custLokasi[idx].alamat = label;
  _renderCustLokasiList();
  const map = window._modalMap;
  if (map) {
    map.setView([lat,lng], 16);
    _custRefreshMapMarkers();
  }
  document.getElementById('custMapResults').classList.add('hidden');
}

function saveCustomer(id){
  const nama = document.getElementById('cf_nama').value.trim();
  if (!nama) return toast('Nama wajib diisi','error');
  const lokasi = (window._custLokasi||[]).filter(l => l.alamat || (l.lat && l.lng));
  // Make sure exactly one lokasi is primary
  if (lokasi.length>0 && !lokasi.some(l=>l.isPrimary)) lokasi[0].isPrimary = true;
  const primary = lokasi.find(l=>l.isPrimary) || lokasi[0] || null;

  const existing = id ? db.customers.find(x=>x.id===id) : null;
  const data = {
    id: id || uid(),
    nama,
    toko: document.getElementById('cf_toko').value.trim(),
    // Mirror primary to legacy fields for backward-compat
    alamat: primary?.alamat || '',
    alamatLengkap: primary?.alamat || '',
    lat: primary?.lat || null,
    lng: primary?.lng || null,
    areaId: document.getElementById('cf_area').value,
    telepon: document.getElementById('cf_tel').value.trim(),
    lokasi,
    autoCreated: existing?.autoCreated || false
  };
  if (id) {
    const idx = db.customers.findIndex(x=>x.id===id);
    db.customers[idx] = data;
  } else {
    db.customers.push(data);
  }
  saveDB();
  window._custLokasi = null; window._custActiveLok = null;
  closeModal();
  toast('Tersimpan');
  renderCustomers();
}

function deleteCustomer(id){
  confirmDelete('Hapus pelanggan ini?', ()=>{
    db.customers = db.customers.filter(c=>c.id!==id);
    saveDB();
    renderCustomers();
    toast('Pelanggan dihapus');
  });
}

function _docExpBadge(dateStr){
  if (!dateStr) return '<span class="text-slate-300 text-xs">-</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(dateStr);
  const diff = Math.round((exp-today)/(1000*60*60*24));
  if (diff < 0) return `<span class="badge badge-danger text-xs">EXPIRED ${Math.abs(diff)}h lalu</span>`;
  if (diff <= 30) return `<span class="badge badge-draft text-xs" style="background:#fef3c7;color:#92400e">~${diff}h lagi</span>`;
  return `<span class="text-xs text-emerald-700 font-medium">${dateStr}</span>`;
}

function editDriver(id){
  const d = id ? db.drivers.find(x=>x.id===id) : {nama:'',peran:'sopir',gajiHarian:136718,telepon:'',rateLembur:0};
  const defaultLembur = db.settings.rateLemburPerJam || 0;
  openModal(id?'Edit Karyawan':'Tambah Karyawan', `
    <div class="space-y-3">
      <div><label class="label">Nama *</label><input id="df_nama" class="input" value="${d.nama||''}"></div>
      <div><label class="label">Peran</label>
        <select id="df_peran" class="input">
          <option value="sopir" ${d.peran==='sopir'?'selected':''}>Sopir</option>
          <option value="helper" ${d.peran==='helper'?'selected':''}>Helper</option>

      <div>

  `);
}

function saveDriver(id){
  const nama = document.getElementById('df_nama').value.trim();
  if (!nama) return toast('Nama wajib','error');
  const data = {
    id: id || uid(),
    nama,
    peran: document.getElementById('df_peran').value,
    gajiHarian: parseFloat(document.getElementById('df_gaji').value)||0,
    rateLembur: parseFloat(document.getElementById('df_lembur').value)||0,
    telepon: document.getElementById('df_tel').value.trim()
  };
  if (id) { const i=db.drivers.findIndex(x=>x.id===id); db.drivers[i]=data; }
  else db.drivers.push(data);
  saveDB(); closeModal(); toast('Tersimpan'); renderDrivers();
}

function deleteDriver(id){
  confirmDelete('Hapus karyawan ini?', ()=>{
    db.drivers = db.drivers.filter(d=>d.id!==id);
    saveDB(); renderDrivers(); toast('Karyawan dihapus');
  });
}

function _highlightZona(val){
  (db.rings||[]).forEach(r=>{
    const el = document.getElementById('zona_opt_'+r.id);
    if (!el) return;
    el.className = 'border-2 rounded-lg p-2.5 text-center transition-all ' +
      (r.id===val ? 'border-amber-500 bg-amber-50' : 'border-[var(--c-line)] hover:border-slate-300');
  });
  const radio = document.querySelector(`[name=af_zona][value="${val}"]`);
  if (radio) radio.checked = true;
}

const _RING_COLOR_MAP = {
  emerald:'bg-emerald-100 text-emerald-800',
  amber:'bg-amber-100 text-amber-800',
  red:'bg-red-100 text-red-800',
  blue:'bg-blue-100 text-blue-800',
  purple:'bg-purple-100 text-purple-800',
  orange:'bg-orange-100 text-orange-800',
  indigo:'bg-indigo-100 text-indigo-800',
  pink:'bg-pink-100 text-pink-800',
  teal:'bg-teal-100 text-teal-800',
  sky:'bg-sky-100 text-sky-800',
};
function _zonaLabel(zonaId){
  const ring = (db.rings||[]).find(r=>r.id===zonaId);
  if (ring){
    return {
      label: ring.nama + (ring.deskripsi ? ' — '+ring.deskripsi.split('(')[0].trim() : ''),
      color: _RING_COLOR_MAP[ring.color] || 'bg-slate-100 text-slate-600'
    };
  }
  return {label:'Zona Lain',color:'bg-slate-100 text-slate-600'};
}

        </div>

      </div>
      <div class="stat-card p-4 rounded-2xl">
        <div class="w-9 h-9 bg-amber-100 rounded-lg flex items-center justify-center mb-2">
          <i data-lucide="ruler" class="w-4 h-4 text-amber-700"></i>
        </div>
        <div class="text-2xl font-bold display">${avgJarak} km</div>
        <div class="text-xs text-slate-500 mt-0.5">Rata-rata Jarak</div>
      </div>
      <div class="stat-card p-4 rounded-2xl">
        <div class="w-9 h-9 bg-emerald-100 rounded-lg flex items-center justify-center mb-2">
          <i data-lucide="users" class="w-4 h-4 text-emerald-700"></i>
