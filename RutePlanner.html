              </button>
              <button onclick="deleteArea('${a.id}')" class="btn-danger px-2 py-1 rounded-lg text-xs">
                <i data-lucide="trash-2" class="w-3 h-3"></i>
              </button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`}
  `;
  lucide.createIcons();
}

/* --- Ring Manager --- */
function openRingManager(){
  function _renderRingList(){
    const rings = db.rings || [];
    const colorDot = c => `<span class="inline-block w-3 h-3 rounded-full bg-${c}-400"></span>`;
    return `
      <div class="space-y-2 mb-4">
        ${rings.length===0?`<p class="text-sm text-slate-400 text-center py-4">Belum ada ring</p>`:''}
        ${rings.map((r,i)=>{
          const aCount = db.areas.filter(a=>a.zona===r.id).length;
          return `
          <div class="flex items-center gap-3 bg-slate-50 rounded-xl px-3 py-2.5 border border-[var(--c-line)]">
            <div class="flex gap-1">
              <button ${i===0?'disabled':''} onclick="_moveRing('${r.id}',-1)" class="p-1 rounded hover:bg-slate-200 disabled:opacity-30" title="Naik">
                <i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>
              </button>
              <button ${i===rings.length-1?'disabled':''} onclick="_moveRing('${r.id}',1)" class="p-1 rounded hover:bg-slate-200 disabled:opacity-30" title="Turun">
                <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
              </button>
            </div>
            ${colorDot(r.color||'slate')}
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-sm">${r.nama}</div>
              <div class="text-xs text-slate-400">${r.deskripsi||'—'} · ${r.minJarak||0}–${r.maxJarak>=999?'∞':r.maxJarak} km · <strong>${aCount}</strong> wilayah</div>
            </div>
            <div class="flex gap-1">
              <button onclick="editRing('${r.id}')" class="btn-secondary px-2 py-1 rounded-lg text-xs">Edit</button>
              <button onclick="deleteRing('${r.id}')" class="btn-danger px-2 py-1 rounded-lg text-xs"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <button onclick="editRing()" class="w-full btn-primary py-2 rounded-xl text-sm flex items-center justify-center gap-2">
        <i data-lucide="plus" class="w-4 h-4"></i> Tambah Ring Baru
      </button>`;
  }
  openModal('Kelola Ring / Zona', _renderRingList(),
    `<button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal();renderAreas()">Tutup</button>`);
  lucide.createIcons();
}

function _moveRing(id, dir){
  const idx = db.rings.findIndex(r=>r.id===id);
  const newIdx = idx+dir;
  if (newIdx<0||newIdx>=db.rings.length) return;
  const tmp = db.rings[idx]; db.rings[idx]=db.rings[newIdx]; db.rings[newIdx]=tmp;
  saveDB(); openRingManager();
}

function editRing(id){
  const r = id ? db.rings.find(x=>x.id===id)
    : {id:'',nama:'',deskripsi:'',minJarak:0,maxJarak:50,color:'blue'};
  const colors = ['emerald','amber','red','blue','purple','orange','indigo','pink','teal','sky'];
  openModal(id?'Edit Ring':'Tambah Ring Baru', `
    <div class="space-y-3">
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label">Nama Ring *</label>
          <input id="rf_nama" class="input" value="${r.nama||''}" placeholder="Ring 4, Luar Kota...">
        </div>
        <div>
          <label class="label">ID Unik *</label>
          <input id="rf_id" class="input font-mono" value="${r.id||''}" placeholder="ring4, luar_kota..." ${id?'readonly':''}>
          ${id?'<p class="text-[10px] text-slate-400 mt-0.5">Tidak dapat diubah</p>':'<p class="text-[10px] text-slate-400 mt-0.5">Huruf kecil, tanpa spasi</p>'}
        </div>
      </div>
      <div>
        <label class="label">Deskripsi / Keterangan</label>
        <input id="rf_desk" class="input" value="${r.deskripsi||''}" placeholder="Jauh (> 30 km), Luar kota...">
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="label">Jarak Minimum (km)</label>
          <input id="rf_min" type="number" min="0" class="input" value="${r.minJarak||0}">
          <p class="text-[10px] text-slate-400 mt-0.5">Batas bawah zona ini</p>
        </div>
        <div>
          <label class="label">Jarak Maksimum (km)</label>
          <input id="rf_max" type="number" min="1" class="input" value="${r.maxJarak>=999?'':r.maxJarak||''}">
          <p class="text-[10px] text-slate-400 mt-0.5">Kosongkan = tidak terbatas (∞)</p>
        </div>
      </div>
      <div>
        <label class="label">Warna Badge</label>
        <div class="flex flex-wrap gap-2 mt-1" id="colorPicker">
          ${colors.map(c=>`
            <button type="button" onclick="_pickRingColor('${c}')" id="rcolor_${c}"
              class="w-8 h-8 rounded-full bg-${c}-400 ring-2 transition-all ${r.color===c?'ring-slate-700 ring-offset-2':'ring-transparent hover:ring-slate-300'}">
            </button>`).join('')}
        </div>
        <input type="hidden" id="rf_color" value="${r.color||'blue'}">
      </div>
    </div>
  `, `
    <button class="btn-secondary px-4 py-2 rounded-lg" onclick="openRingManager()">Batal</button>
    <button class="btn-primary px-4 py-2 rounded-lg" onclick="saveRing('${id||''}')">Simpan Ring</button>
  `);
  lucide.createIcons();
}

function _pickRingColor(c){
  const colors = ['emerald','amber','red','blue','purple','orange','indigo','pink','teal','sky'];
  colors.forEach(x=>{
    const el = document.getElementById('rcolor_'+x);
    if (el) el.className = `w-8 h-8 rounded-full bg-${x}-400 ring-2 transition-all `+(x===c?'ring-slate-700 ring-offset-2':'ring-transparent hover:ring-slate-300');
  });
  const hidden = document.getElementById('rf_color');
  if (hidden) hidden.value = c;
}

function saveRing(id){
  const nama = document.getElementById('rf_nama').value.trim();
  if (!nama) return toast('Nama ring wajib diisi','error');
  const rawId = id || document.getElementById('rf_id').value.trim().toLowerCase().replace(/\s+/g,'_');
  if (!rawId) return toast('ID ring wajib diisi','error');
  if (!id && db.rings.some(r=>r.id===rawId)) return toast('ID sudah dipakai, gunakan ID lain','error');
  const maxVal = parseInt(document.getElementById('rf_max').value);
  const data = {
    id: rawId,
    nama,
    deskripsi: document.getElementById('rf_desk').value.trim(),
    minJarak: parseInt(document.getElementById('rf_min').value)||0,
    maxJarak: isNaN(maxVal)||maxVal<=0 ? 999 : maxVal,
    color: document.getElementById('rf_color').value || 'blue'
  };
  if (id){
    const i = db.rings.findIndex(r=>r.id===id);
    db.rings[i] = data;
  } else {
    db.rings.push(data);
  }
  saveDB(); toast('Ring tersimpan'); openRingManager();
}

function deleteRing(id){
  const aCount = db.areas.filter(a=>a.zona===id).length;
  const msg = aCount>0
    ? `Hapus ring ini? ${aCount} wilayah yang pakai ring ini akan jadi "Zona Lain".`
    : 'Hapus ring ini?';
  confirmDelete(msg, ()=>{
    db.rings = db.rings.filter(r=>r.id!==id);
    saveDB(); toast('Ring dihapus'); openRingManager();
  });
}

function editArea(id){
  const s = db.settings;
  const rings = db.rings || [];
  const defaultZona = rings.length ? rings[0].id : 'ring1';
  const a = id ? db.areas.find(x=>x.id===id) : {nama:'',jarakEstimasi:10,estimasiMenit:0,zona:defaultZona,deskripsi:''};
  const curZona = a.zona || defaultZona;
  const autoMenit = Math.round((a.jarakEstimasi||10)/(s.kecepatanRataKmJam||35)*60);
  const cols = rings.length <= 3 ? rings.length : rings.length <= 4 ? 4 : 3;
  openModal(id?'Edit Wilayah':'Tambah Wilayah', `
    <div class="space-y-3">
      <div><label class="label">Nama Wilayah *</label>
        <input id="af_nama" class="input" value="${a.nama||''}" placeholder="Contoh: Panakkukang, Tamalanrea...">
      </div>
      <div>
        <label class="label">Ring / Zona</label>
        <div class="grid gap-2" style="grid-template-columns:repeat(${cols},1fr)" id="zonaGroup">
          ${rings.map(r=>`

  `);
}

function saveArea(id){
  const nama = document.getElementById('af_nama').value.trim();
  if (!nama) return toast('Nama wajib','error');
  const jarak = parseFloat(document.getElementById('af_jarak').value)||0;
  if (jarak<=0) return toast('Jarak harus > 0','error');
  const zonaEl = document.querySelector('[name=af_zona]:checked');
  const data = {
    id: id || uid(),
    nama,
    jarakEstimasi: jarak,
    estimasiMenit: parseInt(document.getElementById('af_menit').value)||0,
    zona: zonaEl ? zonaEl.value : ((db.rings||[])[0]||{id:'other'}).id,
    deskripsi: document.getElementById('af_desk').value.trim()
  };
  if (id) { const i=db.areas.findIndex(x=>x.id===id); db.areas[i]=data; }
  else db.areas.push(data);
  saveDB(); closeModal(); toast('Tersimpan'); renderAreas();
}

function deleteArea(id){
  const custCount = db.customers.filter(c=>c.areaId===id).length;
  const msg = custCount>0
    ? `Hapus wilayah ini? ${custCount} pelanggan akan kehilangan wilayah.`
    : 'Hapus wilayah ini?';
  confirmDelete(msg, ()=>{
    db.areas = db.areas.filter(a=>a.id!==id);
    saveDB(); renderAreas(); toast('Wilayah dihapus');
  });
}

function initGudangMap(){
  const s = db.settings;
  const lat = s.gudangLat || -5.1477;
  const lng = s.gudangLng || 119.4327;
  const map = L.map('gudangMap').setView([lat, lng], 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {maxZoom:19, attribution:'© OSM © CARTO'}).addTo(map);
  window._gudangMap = map;
  let marker = L.marker([lat,lng]).addTo(map);
  map.on('click', async e=>{
    const {lat, lng} = e.latlng;
    document.getElementById('s_gudangLat').value = lat.toFixed(6);
    document.getElementById('s_gudangLng').value = lng.toFixed(6);
    if (marker) marker.remove();
    marker = L.marker([lat,lng]).addTo(map);
    const addr = await reverseGeocode(lat, lng);
    if (addr) document.getElementById('s_gudangAlamat').value = addr;
  });
  setTimeout(()=>map.invalidateSize(), 200);
}

async function doGudangSearch(){
  const q = document.getElementById('gudangSearch').value;
  if (!q) return;
  const r = document.getElementById('gudangResults');
  r.classList.remove('hidden');
  r.innerHTML = '<div class="p-2 text-slate-500"><span class="spinner"></span> Cari...</div>';
  const results = await geocode(q);
  if (results.length === 0) {
    r.innerHTML = '<div class="p-2 text-slate-500">Tidak ada hasil</div>';
    return;
  }
  r.innerHTML = results.map(re=>`
    <div class="search-result-item" onclick="selectGudangResult(${re.lat},${re.lng},'${(re.label||'').replace(/'/g,'&#39;')}')">
      <div class="text-xs">${re.label}</div>
    </div>
  `).join('');
}

function selectGudangResult(lat, lng, label){
  document.getElementById('s_gudangLat').value = lat.toFixed(6);
  document.getElementById('s_gudangLng').value = lng.toFixed(6);
  document.getElementById('s_gudangAlamat').value = label;
  const map = window._gudangMap;
  if (map) {
    map.setView([lat,lng], 16);
    if (window._gudangMarker) window._gudangMarker.remove();
    window._gudangMarker = L.marker([lat,lng]).addTo(map);
  }
  document.getElementById('gudangResults').classList.add('hidden');
}

function downloadBackup(){
  const blob = new Blob([JSON.stringify(db,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `RutePlanner-Backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup berhasil diunduh');
}

function restoreBackup(file){
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.settings || !Array.isArray(data.vehicles)) throw new Error('Format tidak valid');
      if (confirm('Yakin ingin menimpa data saat ini dengan backup?')) {
        db = data;
        saveDB();
        toast('Data berhasil dipulihkan');
        setTimeout(()=>setView('dashboard'), 600);
      }
    } catch(err){
      toast('File tidak valid: '+err.message,'error');
    }
  };
  reader.readAsText(file);
}

function resetDB(){
  confirmDelete('Yakin ingin reset SEMUA data? Ini akan menghapus semua pelanggan, rencana, dan riwayat yang Anda buat. Pertimbangkan backup dulu.', ()=>{
    db = JSON.parse(JSON.stringify(DEFAULT_DB));
    saveDB();
    toast('Database direset');
    setTimeout(()=>setView('dashboard'),600);
  });
}

/* =========================================================

   ========================================================= */
function openNotaModal(stopId){
  const p = window._currentPlan;
  const stop = p.stops.find(x=>x.id===stopId);
  if (!stop) return;
  if (!stop.nota) stop.nota = [];
  // Migrate legacy flat nota items to new structure
  stop.nota = stop.nota.map(n=>{
    if (!n.items) return {id:n.id, noNota:n.noNota, items:[{id:uid(),namaBarang:n.namaBarang,nominal:n.nominal}]};
    return n;
  });
  _renderNotaModal(stopId);
}

function _renderNotaModal(stopId){
  const p = window._currentPlan;
  const stop = p.stops.find(x=>x.id===stopId);
  if (!stop) return;
  const total = calcTotalNotaStop(stop);

  const activeAddId = window._addItemNotaId || null;
  const notaListHTML = (stop.nota||[]).length === 0
    ? `<div class="p-6 text-center text-slate-400 text-sm italic">Belum ada nota. Tambahkan di bawah.</div>`
    : (stop.nota||[]).map(n=>{
        const subTotal = (n.items||[]).reduce((a,i)=>a+(i.nominal||0),0);
        const isAdding = activeAddId === n.id;
        return `
        <div class="border border-[var(--c-line)] rounded-lg overflow-hidden mb-2">
          <div class="flex items-center justify-between px-3 py-2 bg-slate-50">
            <span class="font-bold text-sm text-slate-700">${n.noNota||'(no nota)'}</span>
            <div class="flex items-center gap-2">
              <span class="text-sm font-bold text-amber-700">${fmtRp(subTotal)}</span>
              <button onclick="_addNotaItem('${stopId}','${n.id}')" class="btn-info px-2 py-0.5 rounded text-xs flex items-center gap-1">
                <i data-lucide="plus" class="w-3 h-3"></i> Barang
              </button>
              <button onclick="_removeNota('${stopId}','${n.id}')" class="btn-danger px-2 py-0.5 rounded text-xs">Hapus</button>
            </div>
          </div>
          <table class="w-full text-sm">
            <tbody>
              ${(n.items||[]).map(it=>`
              <tr class="border-t border-[var(--c-line)]">
                <td class="px-3 py-1.5">${it.namaBarang||'-'}</td>
                <td class="px-3 py-1.5 text-right font-semibold text-slate-700">${fmtRp(it.nominal)}</td>
                <td class="px-2 py-1.5 text-center" style="width:36px">
                  <button onclick="_removeNotaItem('${stopId}','${n.id}','${it.id}')" class="text-red-400 hover:bg-red-50 p-0.5 rounded">
                    <i data-lucide="x" class="w-3.5 h-3.5"></i>
                  </button>
                </td>
              </tr>`).join('')}
              ${isAdding ? `
              <tr class="border-t border-blue-200 bg-blue-50">
                <td class="px-2 py-1.5">
                  <input id="ni_nama_${n.id}" class="input py-1 text-sm" placeholder="Nama barang *" onkeyup="if(event.key==='Enter')document.getElementById('ni_nom_${n.id}').focus()">
                </td>
                <td class="px-2 py-1.5">
                  <input type="number" id="ni_nom_${n.id}" class="input py-1 text-sm text-right" placeholder="Nominal" onkeyup="if(event.key==='Enter')_confirmAddNotaItem('${stopId}','${n.id}')">
                </td>
                <td class="px-2 py-1.5 text-center">
                  <button onclick="_confirmAddNotaItem('${stopId}','${n.id}')" class="btn-primary px-2 py-1 rounded text-xs">✓</button>
                </td>
              </tr>` : ''}
            </tbody>
          </table>
        </div>`;
      }).join('');

  const bodyHTML = `
    <div class="mb-3 flex items-center justify-between">
      <span class="text-sm font-semibold text-slate-700">${stop.customerNama||'Stop'} — SJ: ${stop.noSuratJalan||'(belum diisi)'}</span>
      <span class="text-base font-bold text-amber-700">Total: ${fmtRp(total)}</span>
    </div>
    <div id="notaItemList" class="mb-4 max-h-64 overflow-y-auto scrollbar">${notaListHTML}</div>
    <div class="bg-slate-50 rounded-lg p-3 border border-[var(--c-line)]">
      <p class="text-xs font-bold text-slate-600 mb-2">+ Tambah Nota Baru (beserta barang pertama):</p>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
        <div><label class="label">No. Nota *</label><input id="nf_no" class="input" placeholder="NTA-0012"></div>
        <div><label class="label">Nama Barang *</label><input id="nf_nama" class="input" placeholder="Besi, Semen, Cat..."></div>
        <div><label class="label">Nominal (Rp) *</label><input type="number" id="nf_nominal" class="input" placeholder="0" onkeyup="if(event.key==='Enter')_addNota('${stopId}')"></div>
      </div>
      <button onclick="_addNota('${stopId}')" class="btn-primary px-4 py-2 rounded-lg text-sm mt-3 flex items-center gap-2">
        <i data-lucide="file-plus" class="w-4 h-4"></i> Tambah Nota
      </button>
    </div>
  `;
  openModal(`Kelola Nota — ${stop.customerNama||'Stop'}`, bodyHTML,
    `<button onclick="closeModal();refreshStopsList();refreshSummary()" class="btn-primary px-4 py-2 rounded-lg">Selesai</button>`);
  lucide.createIcons();
}

function _addNota(stopId){
  const noNota = (document.getElementById('nf_no')?.value||'').trim();
  const nama = (document.getElementById('nf_nama')?.value||'').trim();
  const nominal = parseFloat(document.getElementById('nf_nominal')?.value)||0;
  if (!noNota) return toast('Isi No. Nota dulu','error');
  if (!nama) return toast('Isi nama barang dulu','error');
  if (nominal <= 0) return toast('Isi nominal','error');
  const p = window._currentPlan;
  const stop = p.stops.find(x=>x.id===stopId);
  if (!stop) return;
  if (!stop.nota) stop.nota = [];
  stop.nota.push({ id:uid(), noNota, items:[{id:uid(), namaBarang:nama, nominal}] });
  _renderNotaModal(stopId);
}

function _addNotaItem(stopId, notaId){
  window._addItemNotaId = notaId;
  _renderNotaModal(stopId);
  setTimeout(()=>{ const el=document.getElementById('ni_nama_'+notaId); if(el)el.focus(); },50);
}

function _confirmAddNotaItem(stopId, notaId){
  const nama = (document.getElementById('ni_nama_'+notaId)?.value||'').trim();
  const nominal = parseFloat(document.getElementById('ni_nom_'+notaId)?.value)||0;
  if (!nama) return toast('Isi nama barang','error');
  if (nominal <= 0) return toast('Isi nominal','error');
  const p = window._currentPlan;
  const stop = p.stops.find(x=>x.id===stopId);
  const nota = stop && (stop.nota||[]).find(n=>n.id===notaId);
  if (!nota) return;
  if (!nota.items) nota.items = [];
  nota.items.push({id:uid(), namaBarang:nama, nominal});
  window._addItemNotaId = null;
  _renderNotaModal(stopId);
}

function _removeNota(stopId, notaId){
  const p = window._currentPlan;
  const stop = p.stops.find(x=>x.id===stopId);
  if (!stop) return;
  stop.nota = (stop.nota||[]).filter(n=>n.id!==notaId);
  _renderNotaModal(stopId);
}

function _removeNotaItem(stopId, notaId, itemId){
  const p = window._currentPlan;
  const stop = p.stops.find(x=>x.id===stopId);
  const nota = stop && (stop.nota||[]).find(n=>n.id===notaId);
  if (!nota) return;
  nota.items = (nota.items||[]).filter(i=>i.id!==itemId);
  if (nota.items.length === 0) stop.nota = (stop.nota||[]).filter(n=>n.id!==notaId);
  _renderNotaModal(stopId);
}

        <div>

          <p class="text-xs text-slate-400 mt-1">Plan: ${fmtNum(c.totalKm)} km</p>
        </div>
        <div>
          <label class="label">Catatan Realisasi</label>

    <button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal()">Batal</button>

  `);

function saveRealisasi(planId){
  const p = db.plans.find(x=>x.id===planId);
  if (!p) return;
  const pulang = document.getElementById('real_pulang').value;
  if (!pulang) return toast('Isi jam pulang aktual dulu','error');
  const helperSel = document.getElementById('real_helpers');
  const helperIdsAktual = helperSel ? Array.from(helperSel.selectedOptions).map(o=>o.value) : (p.helperIds||[]);
  p.realisasi = {
    tglAktual: document.getElementById('real_tgl')?.value || p.tanggal,
    berangkat: document.getElementById('real_brangkat').value,
    pulang,
    kmAktual: parseFloat(document.getElementById('real_km').value)||0,
    catatan: document.getElementById('real_catatan').value.trim(),
    sopirIdAktual: document.getElementById('real_sopir')?.value || p.sopirId,
    helperIdsAktual,
    inputAt: new Date().toISOString()
  };
  // Auto-update status to selesai when realisasi is filled
  if (!p.status || p.status === 'planned' || p.status === 'approved') p.status = 'selesai';
  const idx = db.plans.findIndex(x=>x.id===planId);
  if (idx>=0) db.plans[idx] = p;
  saveDB();
  closeModal();
  toast('Realisasi tersimpan — status diubah ke Selesai');
  openPlanDetail(planId);
}

/* =========================================================
   VIEW: KPI SOPIR
   ========================================================= */
function renderKPI(){
  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);
  const filterMonth = window._kpiMonth || thisMonth;
  const tab = window._kpiTab || 'waktu';
  const effectiveSopirId = p=>(p.realisasi&&p.realisasi.sopirIdAktual)||p.sopirId;

  const sopirs = db.drivers.filter(d=>d.peran==='sopir');
  const monthPlans = db.plans.filter(p=>(p.tanggal||'').startsWith(filterMonth));
  const plansWithReal = monthPlans.filter(p=>p.realisasi&&p.realisasi.pulang);

  // ── KPI Waktu data ──
  const kpiData = sopirs.map(sopir=>{
    const dPlans = monthPlans.filter(p=>effectiveSopirId(p)===sopir.id);
    const dReal  = dPlans.filter(p=>p.realisasi&&p.realisasi.pulang);
    const devs   = dReal.map(p=>{
      const c = calcPlanCost(p);
      if (!c.jamPulang) return null;
      const [ph,pm]=c.jamPulang.split(':').map(Number);
      const [rh,rm]=p.realisasi.pulang.split(':').map(Number);
      return (rh*60+rm)-(ph*60+pm);
    }).filter(x=>x!==null);
    const avgDev  = devs.length ? Math.round(devs.reduce((a,b)=>a+b,0)/devs.length) : null;
    const scores  = devs.map(d=>Math.max(0,Math.round(100-Math.max(0,d/3))));
    const avgKPI  = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : null;
    const kmDevs  = dReal.map(p=>{
      const c=calcPlanCost(p);
      return (p.realisasi.kmAktual&&c.totalKm)?p.realisasi.kmAktual-c.totalKm:null;
    }).filter(x=>x!==null);
    const avgKmDev = kmDevs.length ? Math.round(kmDevs.reduce((a,b)=>a+b,0)/kmDevs.length) : null;
    return {sopir, total:dPlans.length, real:dReal.length, avgDev, avgKPI, avgKmDev};
  }).filter(d=>d.total>0);

  const allScores  = kpiData.filter(d=>d.avgKPI!==null);
  const overallKPI = allScores.length ? Math.round(allScores.reduce((a,b)=>a+(b.avgKPI||0),0)/allScores.length) : null;

  // ── Produktivitas Sopir (bulan ini) ──
  const sopirProd = sopirs.map(sopir=>{
    const plans    = monthPlans.filter(p=>effectiveSopirId(p)===sopir.id);
    if (!plans.length) return null;
    const withKM   = plans.filter(p=>p.realisasi&&p.realisasi.kmAktual);
    const totalKM  = withKM.reduce((s,p)=>s+(p.realisasi.kmAktual||0),0);
    const totalNota= plans.reduce((s,p)=>s+calcTotalNota(p),0);
    const totalStops=plans.reduce((s,p)=>s+(p.stops||[]).length,0);
    return {
      sopir, trips:plans.length, withKM:withKM.length,
      totalKM, totalNota, totalStops,
      avgRp : plans.length ? Math.round(totalNota/plans.length)   : 0,
      avgKM : withKM.length? Math.round(totalKM/withKM.length)    : 0,
      avgStop:plans.length ? +(totalStops/plans.length).toFixed(1): 0
    };
  }).filter(Boolean).sort((a,b)=>b.totalNota-a.totalNota);

  const maxNota = Math.max(1,...sopirProd.map(d=>d.totalNota));
  const maxKM   = Math.max(1,...sopirProd.map(d=>d.totalKM));
  const totalNotaBulan = sopirProd.reduce((s,d)=>s+d.totalNota,0);
  const topSopir = sopirProd[0]||null;

  // ── Produktivitas Kendaraan (akumulatif semua waktu) ──
  const svcInterval = db.settings.serviceIntervalKm||10000;
  const vehicleProd = db.vehicles.map(v=>{
    const allPlans  = db.plans.filter(p=>p.vehicleId===v.id);
    const withKM    = allPlans.filter(p=>p.realisasi&&p.realisasi.kmAktual);
    const totalKM   = withKM.reduce((s,p)=>s+(p.realisasi.kmAktual||0),0);
    const totalNota = allPlans.reduce((s,p)=>s+calcTotalNota(p),0);
    const lastPlan  = [...allPlans].sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||''))[0];
    const kmPct     = Math.min(100,Math.round(totalKM/svcInterval*100));
    return {
      v, trips:allPlans.length, withKM:withKM.length,
      totalKM, totalNota, kmPct,
      avgRp  : allPlans.length ? Math.round(totalNota/allPlans.length): 0,
      avgKM  : withKM.length   ? Math.round(totalKM/withKM.length)   : 0,
      lastDate: lastPlan?lastPlan.tanggal:'',
      needsService: totalKM>=svcInterval,
      warnService : totalKM>=svcInterval*0.8
    };
  }).sort((a,b)=>b.totalKM-a.totalKM);

  const needSvcCount = vehicleProd.filter(d=>d.needsService).length;
  const warnSvcCount = vehicleProd.filter(d=>d.warnService&&!d.needsService).length;
  const totalKMArmada= vehicleProd.reduce((s,d)=>s+d.totalKM,0);

  const monthOpts = Array.from({length:12},(_,i)=>{
    const d=new Date(); d.setMonth(d.getMonth()-i);
    return d.toISOString().slice(0,7);
  });

  document.getElementById('view').innerHTML = `
    <div class="mb-5 flex items-start justify-between flex-wrap gap-4">
      <div>
        <h1 class="display text-3xl font-bold">KPI & Produktivitas</h1>
        <p class="text-slate-500 text-sm mt-1">Performa waktu, produktivitas pengiriman, dan kondisi armada</p>
      </div>
      <div class="flex items-center gap-2">
        <label class="label mb-0 text-xs">Bulan:</label>
        <select class="input w-auto text-sm" onchange="window._kpiMonth=this.value;renderKPI()">
          ${monthOpts.map(m=>`<option value="${m}" ${m===filterMonth?'selected':''}>${m}</option>`).join('')}
        </select>
      </div>
    </div>

    <div class="flex border-b border-[var(--c-line)] mb-6 gap-0">
      <button class="tab-btn ${tab==='waktu'?'active':''}" onclick="window._kpiTab='waktu';renderKPI()">KPI Waktu</button>
      <button class="tab-btn ${tab==='sopir'?'active':''}" onclick="window._kpiTab='sopir';renderKPI()">Produktivitas Sopir</button>
      <button class="tab-btn ${tab==='kendaraan'?'active':''}" onclick="window._kpiTab='kendaraan';renderKPI()">Produktivitas Kendaraan</button>
    </div>

    ${tab==='waktu'     ? _tabKPIWaktu(kpiData,allScores,overallKPI,plansWithReal,monthPlans,filterMonth) : ''}
    ${tab==='sopir'     ? _tabProdSopir(sopirProd,maxNota,maxKM,totalNotaBulan,topSopir,filterMonth,monthPlans) : ''}
    ${tab==='kendaraan' ? _tabProdKendaraan(vehicleProd,svcInterval,needSvcCount,warnSvcCount,totalKMArmada) : ''}
  `;
  lucide.createIcons();
}

function openDriverKPIDetail(sopirId, month){
  const sopir = db.drivers.find(x=>x.id===sopirId);
  if (!sopir) return;
  const plans = db.plans.filter(p=>p.sopirId===sopirId&&(p.tanggal||'').startsWith(month));
  const rows = plans.map(p=>{
    const v = db.vehicles.find(x=>x.id===p.vehicleId);
    const c = calcPlanCost(p);
    const r = p.realisasi;
    let dev=null, score=null, devKm=null;
    if (r&&r.pulang&&c.jamPulang){
      const [ph,pm]=c.jamPulang.split(':').map(Number);
      const [rh,rm]=r.pulang.split(':').map(Number);
      dev=(rh*60+rm)-(ph*60+pm);
      score=Math.max(0,Math.round(100-Math.max(0,dev/3)));
    }
    if (r&&r.kmAktual&&c.totalKm) devKm=r.kmAktual-c.totalKm;
    return {p,v,c,r,dev,score,devKm};
  });
  openModal(`KPI Detail — ${sopir.nama} (${month})`, `
    <div class="overflow-x-auto">
    <table>
      <thead><tr>
        <th>Tanggal</th><th>Kendaraan</th><th>Stops</th>
        <th class="text-center">Plan Pulang</th><th class="text-center">Aktual Pulang</th>
        <th class="text-center">Deviasi</th><th class="text-center">KM Plan</th>
        <th class="text-center">KM Aktual</th><th class="text-center">KPI</th>
      </tr></thead>
      <tbody>
        ${rows.map(({p,v,c,r,dev,score,devKm})=>`<tr>
          <td>${fmtDate(p.tanggal)}</td>
          <td class="font-semibold">${v?v.noPolisi:'-'}</td>
          <td class="text-center">${(p.stops||[]).length}</td>
          <td class="text-center">${c.jamPulang||'-'}</td>
          <td class="text-center font-semibold text-emerald-700">${r?r.pulang||'-':'-'}</td>
          <td class="text-center font-semibold ${dev===null?'':dev>30?'text-red-600':dev>0?'text-amber-600':'text-emerald-600'}">
            ${dev===null?'-':`${dev>0?'+':''}${dev} mnt`}
          </td>
          <td class="text-center">${fmtNum(c.totalKm)} km</td>
          <td class="text-center">${r&&r.kmAktual?fmtNum(r.kmAktual)+' km':'-'}</td>
          <td class="text-center font-bold ${score===null?'':score>=80?'text-emerald-600':score>=60?'text-amber-600':'text-red-600'}">
            ${score===null?'-':score+'%'}
          </td>
        </tr>`).join('')||'<tr><td colspan="9" class="text-center text-slate-400 py-6">Tidak ada data</td></tr>'}
      </tbody>
    </table>
    </div>
    <div class="mt-4 p-3 bg-slate-50 rounded-lg text-xs text-slate-600">
      <strong>Total ${rows.length} trip</strong> · ${rows.filter(x=>x.score!==null).length} ada realisasi ·
      KPI rata-rata: <strong>${rows.filter(x=>x.score!==null).length?Math.round(rows.filter(x=>x.score!==null).reduce((a,b)=>a+(b.score||0),0)/rows.filter(x=>x.score!==null).length)+'%':'-'}</strong>
    </div>
  `, `<button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal()">Tutup</button>`);
}

function buildAIContext(){
  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);
  const s = db.settings;
  const eff = p=>(p.realisasi?.sopirIdAktual)||p.sopirId;
  const monthPlans = db.plans.filter(p=>(p.tanggal||'').startsWith(thisMonth));
  const allPlans = db.plans;
  const svcInterval = s.serviceIntervalKm||10000;

  // Month summary
  const totalCost  = monthPlans.reduce((t,p)=>t+calcPlanCost(p).total,0);
  const totalNota  = monthPlans.reduce((t,p)=>t+calcTotalNota(p),0);
  const withReal   = monthPlans.filter(p=>p.realisasi?.pulang);
  const kpiScores  = withReal.map(p=>{
    const c=calcPlanCost(p); if(!c.jamPulang) return null;
    const [ph,pm]=c.jamPulang.split(':').map(Number);
    const [rh,rm]=p.realisasi.pulang.split(':').map(Number);
    return Math.max(0,Math.round(100-Math.max(0,((rh*60+rm)-(ph*60+pm))/3)));
  }).filter(x=>x!==null);
  const avgKPI = kpiScores.length?Math.round(kpiScores.reduce((a,b)=>a+b,0)/kpiScores.length):null;

  // Per driver
  const drivers = db.drivers.filter(d=>d.peran==='sopir').map(d=>{
    const dp = monthPlans.filter(p=>eff(p)===d.id);
    if (!dp.length) return null;
    const dr  = dp.filter(p=>p.realisasi?.pulang);
    const km  = dp.reduce((t,p)=>t+(p.realisasi?.kmAktual||0),0);
    const nota= dp.reduce((t,p)=>t+calcTotalNota(p),0);
    const devs= dr.map(p=>{
      const c=calcPlanCost(p); if(!c.jamPulang) return null;
      const [ph,pm]=c.jamPulang.split(':').map(Number);
      const [rh,rm]=p.realisasi.pulang.split(':').map(Number);
      return (rh*60+rm)-(ph*60+pm);
    }).filter(x=>x!==null);
    const kpi = devs.length?Math.max(0,Math.round(100-Math.max(0,devs.reduce((a,b)=>a+b,0)/devs.length/3))):null;
    return {nama:d.nama, trip:dp.length, realisasi:dr.length, kpi_score:kpi, total_km:km,
            total_nota_rb:Math.round(nota/1000), avg_nota_rb:dp.length?Math.round(nota/dp.length/1000):0};
  }).filter(Boolean);

  // Per vehicle (all-time KM)
  const vehicles = db.vehicles.map(v=>{
    const vp = allPlans.filter(p=>p.vehicleId===v.id);
    const km = vp.reduce((t,p)=>t+(p.realisasi?.kmAktual||0),0);
    const nota = vp.reduce((t,p)=>t+calcTotalNota(p),0);
    const lastDate = [...vp].sort((a,b)=>(b.tanggal||'').localeCompare(a.tanggal||''))[0]?.tanggal||null;
    const pct = Math.round(km/svcInterval*100);
    const svc = km>=svcInterval?'PERLU SERVIS SEGERA':km>=svcInterval*0.8?'Mendekati servis':'OK';
    return {polisi:v.noPolisi, jenis:v.jenis||'Truck', total_trip:vp.length,
            km_akumulatif:km, persen_servis:pct+'%', status_servis:svc,
            total_cargo_rb:Math.round(nota/1000), trip_terakhir:lastDate};
  });

  // Alerts
  const alerts = [];
  db.vehicles.forEach(v=>{
    const d = new Date(); const t30 = new Date(d.getTime()+30*86400000);
    if (v.expKIR  && new Date(v.expKIR) <d) alerts.push(`KIR ${v.noPolisi} sudah EXPIRED`);
    else if (v.expKIR && new Date(v.expKIR)<t30) alerts.push(`KIR ${v.noPolisi} expired dalam 30 hari`);
    if (v.expSTNK && new Date(v.expSTNK)<d) alerts.push(`STNK ${v.noPolisi} sudah EXPIRED`);
    else if (v.expSTNK && new Date(v.expSTNK)<t30) alerts.push(`STNK ${v.noPolisi} expire dalam 30 hari`);
  });
  drivers.filter(d=>d.kpi_score!==null&&d.kpi_score<60).forEach(d=>alerts.push(`KPI ${d.nama} hanya ${d.kpi_score}% — perlu perhatian`));
  vehicles.filter(v=>v.status_servis==='PERLU SERVIS SEGERA').forEach(v=>alerts.push(`${v.polisi} ${v.status_servis}`));

  return JSON.stringify({
    tanggal_hari_ini: today,
    bulan_analisis: thisMonth,
    perusahaan: s.namaUsaha,
    ringkasan_bulan: {
      total_trip: monthPlans.length,
      trip_dengan_realisasi: withReal.length,
      coverage_persen: monthPlans.length?Math.round(withReal.length/monthPlans.length*100):0,
      biaya_operasional_rb: Math.round(totalCost/1000),
      nilai_nota_rb: Math.round(totalNota/1000),
      kpi_rata_rata: avgKPI!==null?avgKPI+'%':'belum ada data realisasi',
      jumlah_sopir_aktif: drivers.length,
      jumlah_kendaraan: db.vehicles.length
    },
    data_sopir: drivers,
    data_kendaraan: vehicles,
    peringatan_aktif: alerts,
    interval_servis_km: svcInterval
  }, null, 2);
}

function _renderMD(text){
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^#### (.+)$/gm,'<p class="font-bold mt-3 mb-1 text-sm">$1</p>')
    .replace(/^### (.+)$/gm,'<p class="font-bold mt-4 mb-1">$1</p>')
    .replace(/^## (.+)$/gm,'<p class="font-bold text-lg mt-4 mb-1">$1</p>')
    .replace(/^# (.+)$/gm,'<p class="font-bold text-xl mt-4 mb-2">$1</p>')
    .replace(/^- (.+)$/gm,'<li class="ml-5 list-disc leading-relaxed">$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li class="ml-5 list-decimal leading-relaxed">$2</li>')
    .replace(/`(.+?)`/g,'<code class="bg-slate-100 px-1 rounded text-xs font-mono">$1</code>')
    .replace(/\n\n+/g,'</p><p class="mt-2">').replace(/\n/g,'<br>');
}

async function askAI(question){
  const cfg = _aiProviderConfig();
  if (!cfg.key) { toast('Isi API Key di Pengaturan dulu','error'); return null; }
  if (window._aiThinking) return null;
  window._aiThinking = true;

  const context = buildAIContext();
  const sysPrompt = `Kamu adalah Manajer Operasional Logistik berpengalaman 15 tahun untuk perusahaan pengiriman bahan bangunan di Indonesia.
Tugasmu: menganalisis data operasional harian dan memberikan rekomendasi praktis yang langsung bisa dieksekusi.
Gaya bicara: profesional tapi santai, langsung ke point, pakai emoji secukupnya untuk keterbacaan.
Format: gunakan heading (##), bullet points (-), dan bold (**) untuk struktur yang jelas.
Bahasa: Bahasa Indonesia.

DATA OPERASIONAL TERKINI (JSON):
${context}`;

  const messages = [
    {role:'system', content: sysPrompt},
    ...window._aiHistory.slice(-10),   // max 10 turns history
    {role:'user', content: question}
  ];

  try {
    const headers = {'Content-Type':'application/json','Authorization':`Bearer ${cfg.key}`};
    if (cfg.prov==='openrouter') headers['HTTP-Referer'] = location.href;

    const res = await fetch(`${cfg.base}/chat/completions`, {
      method:'POST',
      headers,
      body: JSON.stringify({model:cfg.model, messages, max_tokens:1800, temperature:0.7, stream:true})
    });

    if (!res.ok){
      const err = await res.json().catch(()=>({error:{message:'HTTP '+res.status}}));
      throw new Error(err.error?.message||'API Error '+res.status);
    }

    // Stream response
    const msgId = 'ai_msg_'+Date.now();
    const bubble = document.getElementById('aiChatBody');
    bubble.innerHTML += `<div id="${msgId}" class="flex gap-3 mb-4">
      <div class="w-8 h-8 rounded-full bg-[var(--c-accent)] flex items-center justify-center flex-shrink-0 mt-0.5">
        <i data-lucide="bot" class="w-4 h-4 text-white"></i>
      </div>
      <div class="flex-1 min-w-0">
        <div class="text-xs text-slate-400 mb-1 font-semibold">AI Manajer</div>
        <div id="${msgId}_text" class="text-sm leading-relaxed prose max-w-none">
          <span class="animate-pulse text-slate-400">Sedang menganalisis data...</span>
        </div>
      </div>
    </div>`;
    lucide.createIcons();
    bubble.scrollTop = bubble.scrollHeight;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '';
    const textEl = document.getElementById(msgId+'_text');

    while (true){
      const {done,value} = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n').filter(l=>l.startsWith('data: ')&&l!=='data: [DONE]');
      for (const line of lines){
        try {
          const d = JSON.parse(line.slice(6));
          const delta = d.choices?.[0]?.delta?.content||'';
          if (delta){
            fullText += delta;
            textEl.innerHTML = '<p>'+_renderMD(fullText)+'</p>';
            bubble.scrollTop = bubble.scrollHeight;
          }
        } catch(e){}
      }
    }

    window._aiHistory.push({role:'user', content:question});
    window._aiHistory.push({role:'assistant', content:fullText});
    return fullText;

  } catch(e){
    toast('Error AI: '+e.message, 'error');
    const textEl = document.getElementById(document.querySelector('[id^=ai_msg_]')?.id+'_text');
    return null;
  } finally {
    window._aiThinking = false;
    const btn = document.getElementById('aiSendBtn');
    if (btn){ btn.disabled=false; btn.innerHTML='<i data-lucide="send" class="w-4 h-4"></i>'; }
    lucide.createIcons();
  }
}

function exportToExcel(){
  if (typeof XLSX === 'undefined') return toast('Library SheetJS belum termuat','error');
  const wb = XLSX.utils.book_new();

  // --- Sheet: Trip / Rencana ---
  const tripRows = [['ID','Tanggal','Kendaraan','Sopir','Status','Total Biaya','Jam Pulang Est','Tgl Aktual','Jam Berangkat','Jam Pulang Aktual','KM Aktual','KPI Score']];
  db.plans.forEach(p=>{
    const v  = db.vehicles.find(x=>x.id===p.vehicleId);
    const dr = db.drivers.find(x=>x.id===p.sopirId);
    const c  = calcPlanCost(p);
    const r  = p.realisasi||{};
    let kpi = '';
    if (r.pulang && c.jamPulang) {
      const [ph,pm]=c.jamPulang.split(':').map(Number);
      const [rh,rm]=r.pulang.split(':').map(Number);
      kpi = Math.max(0, Math.round(100-Math.max(0,((rh*60+rm)-(ph*60+pm))/3)))+'%';
    }
    tripRows.push([
      p.id, p.tanggal||'', v?v.noPolisi:'-', dr?dr.nama:'-',
      (p.status||'draft').toUpperCase(), c.total, c.jamPulang||'',
      r.tglAktual||'', r.berangkat||'', r.pulang||'',
      r.kmAktual||'', kpi
    ]);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(tripRows), 'Trip');

  // --- Sheet: Stops & Nota ---
  const stopRows = [['Plan ID','Tanggal Plan','No Stop','Nama Customer','Alamat','Service Menit','No Nota','Nama Barang','Nominal']];
  db.plans.forEach(p=>{
    (p.stops||[]).forEach((st,si)=>{
      const notas = st.nota||[];
      if (notas.length===0){
        stopRows.push([p.id,p.tanggal||'',si+1,st.nama||'',st.alamat||'',st.serviceMenit||20,'','','']);
      } else {
        notas.forEach(n=>{
          const items = n.items||[{namaBarang:'',nominal:n.nominal||0}];
          items.forEach(it=>{
            stopRows.push([p.id,p.tanggal||'',si+1,st.nama||'',st.alamat||'',st.serviceMenit||20,n.noNota||'',it.namaBarang||'',it.nominal||0]);
          });
        });
      }
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(stopRows), 'Stop & Nota');

  // --- Sheet: Drivers ---
  const drvRows = [['ID','Nama','Peran','Gaji Harian','Rate Lembur/Jam','Telepon']];
  db.drivers.forEach(d=>{
    drvRows.push([d.id,d.nama,d.peran||'',d.gajiHarian||0,d.rateLembur||0,d.telepon||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(drvRows), 'Driver');

  // --- Sheet: Vehicles ---
  const vehRows = [['ID','No Polisi','Jenis','KM/Liter','Kapasitas','Solar Per Trip','Exp KIR','Exp STNK','Status']];
  db.vehicles.forEach(v=>{
    vehRows.push([v.id,v.noPolisi,v.jenis||'',v.kmPerLiter||0,v.kapasitas||0,v.solarPerTrip||0,v.expKIR||'',v.expSTNK||'',v.status||'aktif']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(vehRows), 'Kendaraan');

  // --- Sheet: Customers ---
  const custRows = [['ID','Nama','Alamat','Telepon','Wilayah','Lat','Lng']];
  db.customers.forEach(c=>{
    const area = db.areas.find(a=>a.id===c.areaId);
    custRows.push([c.id,c.nama,c.alamat||'',c.telepon||'',area?area.nama:'',c.lat||'',c.lng||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(custRows), 'Customer');

  // --- Sheet: Areas ---
  const areaRows = [['ID','Nama','Zona','Jarak (km)','Est Tempuh (menit)','Deskripsi']];
  db.areas.forEach(a=>{
    areaRows.push([a.id,a.nama,a.zona||'',a.jarakEstimasi||0,a.estimasiMenit||0,a.deskripsi||'']);
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(areaRows), 'Wilayah');

  const tgl = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `RutePlanner_Export_${tgl}.xlsx`);
  toast('Export berhasil — file tersimpan ✓');
}

   SURAT JALAN MODULE
   ========================================================= */

/* --- Date helpers --- */
function _xlsxDateToISO(val){
  if (!val && val !== 0) return '';
  if (typeof val === 'number') {
    // Excel serial: days since 1900-01-00 (with Lotus 1900 leap year bug)
    const d = new Date(Math.round((val - 25569) * 86400 * 1000));
    return d.toISOString().slice(0,10);
  }
  const s = String(val).trim();
  // Try ISO or DD/MM/YYYY or DD-MM-YYYY directly
  const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (isoMatch) return isoMatch[0];
  const dmyMatch = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if (dmyMatch) return `${dmyMatch[3]}-${dmyMatch[2].padStart(2,'0')}-${dmyMatch[1].padStart(2,'0')}`;
  // Indonesian month names: "23 Apr 2026" / "23 april 2026"
  const bulan = {jan:1,feb:2,mar:3,apr:4,mei:5,jun:6,jul:7,agu:8,sep:9,okt:10,nov:11,des:12,
                 may:5,aug:8,oct:10,dec:12};
  const idMatch = s.match(/(\d{1,2})\s+([a-zA-Z]+)\s+(\d{4})/);
  if (idMatch) {
    const m = bulan[idMatch[2].toLowerCase().slice(0,3)];
    if (m) return `${idMatch[3]}-${String(m).padStart(2,'0')}-${idMatch[1].padStart(2,'0')}`;
  }
  // Fallback: try native Date parse
  const dt = new Date(s);
  if (!isNaN(dt)) return dt.toISOString().slice(0,10);
  return '';
}

/* --- Address parser --- */
function _parseSJAddress(raw){
  if (!raw) return {alamat:'', recipient:'', noTelp:''};
  // Split each line by newline OR comma when the comma intro a known label
  const lines = String(raw)
    .replace(/,\s*(penerima|a\/n|nomor wa|no\.?\s*wa|no\.?\s*hp|no\.?\s*telp|telp|hp|wa)\s*:/gi, '\n$1:')
    .split(/[\n\r]+/).map(l=>l.trim()).filter(Boolean);
  let recipient='', noTelp='', addrLines=[];
  lines.forEach(l=>{
    const recipMatch = l.match(/^(?:a\/n|atas\s+nama|penerima)\s*[:\-]\s*(.+)/i);
    const telpMatch = l.match(/^(?:telp|no\.?\s*telp|hp|no\.?\s*hp|phone|wa|nomor\s*wa|no\.?\s*wa)\s*[:\-]\s*([\d\s\-+]+)/i)
                   || l.match(/^\+?62[\d\s\-]{8,}$/) || l.match(/^0\d{8,}$/);
    // Strip "Lokasi :" prefix if present (Accurate style)
    const lokasiMatch = l.match(/^lokasi\s*[:\-]\s*(.+)/i);
    if (recipMatch) recipient = recipMatch[1].trim();
    else if (telpMatch) noTelp = (telpMatch[1]||telpMatch[0]).replace(/[\s\-]+/g,'').trim();
    else if (lokasiMatch) addrLines.push(lokasiMatch[1].trim());
    else addrLines.push(l);
  });
  return {alamat: addrLines.join(', '), recipient, noTelp};
}

/* --- Excel parser: groups rows by Nomor # into SJ objects --- */
function _parseSJExcel(wb){
  const sheetName = wb.SheetNames.find(n=>n.toLowerCase().includes('rincian')||n.toLowerCase().includes('pengiriman'))
    || wb.SheetNames[0];
  const ws = wb.Sheets[sheetName];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
  if (rows.length < 2) return [];

  // Detect header row (first row containing "Nomor")
  let hdrIdx = 0;
  for (let i=0; i<Math.min(5,rows.length); i++) {
    if (rows[i].some(c=>String(c).toLowerCase().includes('nomor'))) { hdrIdx=i; break; }
  }
  const hdr = rows[hdrIdx].map(h=>String(h).trim().toLowerCase());
  // Smarter column finder: exact match first, then loose includes, with optional exclusion
  const findCol = (exactKeys, looseKeys, excludeKeys=[]) => {
    for (const k of exactKeys) {
      const idx = hdr.findIndex(h => h === k);
      if (idx !== -1) return idx;
    }
    for (const k of looseKeys) {
      const idx = hdr.findIndex(h => h.includes(k) && !excludeKeys.some(ex=>h.includes(ex)));
      if (idx !== -1) return idx;
    }
    return -1;
  };

  const cNama    = findCol(['nama barang','nama'], ['nama barang','barang']);
  const cQty     = findCol(['kuantitas','qty','jumlah'], ['kuantitas','qty']);
  const cSatuan  = findCol(['satuan'], ['satuan']);
  const cNomor   = findCol(['nomor #','nomor','no'], ['nomor']);
  const cTgl     = findCol(['tanggal','tgl'], ['tanggal']);
  // 'pelanggan' must NOT match 'id pelanggan' — explicit exclude
  const cPel     = findCol(['pelanggan','customer','nama pelanggan'], ['pelanggan','customer'], ['id ']);
  const cAlamat  = findCol(['alamat pengiriman pesanan','alamat pengiriman','alamat'], ['alamat']);
  const cHarga   = findCol(['total harga','harga total','harga'], ['total harga','harga']);
  // 'sales' must NOT match 'no telfon sales' / 'no telp sales'
  const cSales   = findCol(['sales','nama sales'], ['sales'], ['telfon','telp','telpon','telepon','no.']);
  const cBerat   = findCol(['total berat','berat'], ['berat']);
  const cTelpC   = findCol(['no telp customer','no. telp customer','telp customer'], ['telp customer','telpon customer','telp']);
  const cTelpS   = findCol(['no telfon sales','no. telfon sales','telp sales'], ['telfon sales','telp sales','telpon sales']);

  const groups = new Map();
  for (let i = hdrIdx+1; i < rows.length; i++) {
    const r = rows[i];
    const noDO = String(r[cNomor]||'').trim();
    if (!noDO) continue;
    if (!groups.has(noDO)) {
      const tglRaw = cTgl>=0 ? r[cTgl] : '';
      const alamatRaw = cAlamat>=0 ? r[cAlamat] : '';
      const {alamat, recipient, noTelp} = _parseSJAddress(alamatRaw);
      groups.set(noDO, {
        id: uid(),
        noDO,
        tanggal: _xlsxDateToISO(tglRaw),
        pelanggan: String(r[cPel]||'').trim(),
        alamat,
        recipient,
        noTelp: noTelp || (cTelpC>=0 ? String(r[cTelpC]||'').trim() : ''),
        noTelpSales: cTelpS>=0 ? String(r[cTelpS]||'').trim() : '',
        sales: cSales>=0 ? String(r[cSales]||'').trim() : '',
        totalBerat: 0,
        totalHarga: 0,
        items: [],
        status: 'unplanned',
        planId: null,
        stopId: null,
        importedAt: new Date().toISOString()
      });
    }
    const sj = groups.get(noDO);
    const namaBarang = String(r[cNama]||'').trim();
    const kuantitas  = parseFloat(r[cQty]||0)||0;
    const satuan     = cSatuan>=0 ? String(r[cSatuan]||'').trim() : '';
    const totalHarga = parseFloat(String(r[cHarga]||'0').replace(/[^\d.]/g,''))||0;
    const berat      = cBerat>=0 ? (parseFloat(r[cBerat]||0)||0) : 0;
    if (namaBarang) {
      sj.items.push({id:uid(), namaBarang, kuantitas, satuan, totalHarga});
      sj.totalHarga += totalHarga;
      sj.totalBerat += berat;
    }
  }
  return Array.from(groups.values());
}

/* --- Plan a SJ directly from the SJ list: create draft plan + open map step --- */
function _planSJ(sjId){
  const sj = (db.suratJalan||[]).find(s=>s.id===sjId);
  if (!sj) return toast('Surat Jalan tidak ditemukan','error');
  if (sj.status !== 'unplanned') return toast('SJ sudah direncanakan','info');

  // Switch nav highlight to "Perencanaan Rute"
  document.querySelectorAll('#nav .nav-item').forEach(b=>{
    b.classList.toggle('active', b.dataset.view==='planning');
  });
  // Build a fresh draft plan (same shape as renderPlanning() with no id)
  renderPlanning();
  // Now window._currentPlan is the new draft — open the map confirmation step
  addSJToStop(sjId);
}

/* --- Step 1: User picked SJ → go to map step to confirm/adjust location --- */
function addSJToStop(sjId){
  const sj = (db.suratJalan||[]).find(s=>s.id===sjId);
  if (!sj) return toast('Surat Jalan tidak ditemukan','error');
  const p = window._currentPlan;
  if (!p) return toast('Tidak ada rencana aktif','error');

  // Match customer (by id first, then by name fallback)
  const cust = (sj.customerId && db.customers.find(c=>c.id===sj.customerId))
    || db.customers.find(c=>(c.nama||'').toLowerCase() === (sj.pelanggan||'').toLowerCase());

  // Build candidates: only those with lat/lng counted as "tersimpan"
  // For lokasi without coords, list separately so user knows they exist but need geocoding
  const candidates = [];
  if (cust) {
    (cust.lokasi||[]).forEach(l=>{
      if (l.lat && l.lng) candidates.push({
        id: l.id,
        lat: l.lat, lng: l.lng,
        alamat: l.alamat||'',
        label: l.label||'Alamat tersimpan',
        isPrimary: !!l.isPrimary,
        source: 'lokasi'
      });
    });
    if (cust.lat && cust.lng && !candidates.some(c=>c.lat===cust.lat && c.lng===cust.lng))
      candidates.push({
        id: 'legacy',
        lat: cust.lat, lng: cust.lng,
        alamat: cust.alamatLengkap||cust.alamat||'',
        label: 'Alamat utama (lama)',
        isPrimary: true,
        source: 'legacy'
      });
  }

  // Default selection: primary if exists, else "new"
  const initial = candidates.find(c=>c.isPrimary) || candidates[0] || null;
  window._sjMapStep = {
    sjId,
    custId: cust?.id || null,
    selectedId: initial ? initial.id : null,  // null = "Alamat baru"
    candidates,
    lat: initial?.lat || null,
    lng: initial?.lng || null,
    alamat: initial?.alamat || sj.alamat || ''
  };

  openModal(`Konfirmasi Lokasi — ${sj.pelanggan||sj.noDO}`, `
    <div class="space-y-3">
      <!-- Customer + SJ Info -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 text-xs">
        <div class="p-3 bg-blue-50 rounded-lg">
          <div class="font-bold text-slate-700 text-sm mb-1">${sj.pelanggan||'-'}</div>
          <div class="text-slate-500">${sj.noDO} · ${fmtDate(sj.tanggal)}</div>
          <div class="text-slate-600 mt-1">${sj.alamat||'-'}</div>
          ${sj.noTelp?`<div class="text-slate-500 mt-0.5"><i data-lucide="phone" class="w-3 h-3 inline"></i> ${sj.noTelp}</div>`:''}
        </div>
        <div class="p-3 bg-emerald-50 rounded-lg">
          <div class="font-bold text-emerald-800 text-sm mb-1">${sj.items.length} item · ${fmtRp(sj.totalHarga)}</div>
          <div class="text-xs text-slate-500 max-h-16 overflow-y-auto">
            ${sj.items.slice(0,3).map(it=>`• ${it.namaBarang} (${fmtNum(it.kuantitas)} ${it.satuan})`).join('<br>')}
            ${sj.items.length>3?`<br><em>...dan ${sj.items.length-3} lainnya</em>`:''}
          </div>
        </div>
      </div>

      <!-- Pilih Alamat Tujuan -->
      <div class="border border-[var(--c-line)] rounded-xl p-3 bg-[var(--c-card)]">
        <div class="flex items-center justify-between mb-2">
          <span class="text-xs font-bold text-slate-700 uppercase">Pilih Alamat Tujuan</span>
          ${candidates.length>0?`<span class="text-[10px] text-slate-400">${candidates.length} alamat tersimpan</span>`:''}
        </div>
        <div id="sjLokasiPicker" class="space-y-1.5"></div>
      </div>

      <!-- Map & Search -->
      <div class="flex gap-2">
        <input type="text" id="sjMapSearch" class="input flex-1 text-sm" placeholder="🔍 Cari alamat di peta..." value="${sj.alamat||''}" onkeyup="if(event.key==='Enter')_sjMapSearch()">
        <button onclick="_sjMapSearch()" class="btn-primary px-3 py-2 rounded-lg text-xs">Cari</button>
      </div>
      <div id="sjMapResults" class="hidden border border-[var(--c-line)] rounded-lg max-h-32 overflow-y-auto text-xs"></div>
      <div id="sjMapPin" class="map-container map-small"></div>

      <!-- Manual lat/lng entry -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-2 items-end">
        <div>
          <label class="label">Latitude</label>
          <input type="number" step="any" id="sjLatInput" class="input text-sm" placeholder="contoh: -5.1477"
            value="${window._sjMapStep.lat||''}" onchange="_sjCoordInputChange()">
        </div>
        <div>
          <label class="label">Longitude</label>
          <input type="number" step="any" id="sjLngInput" class="input text-sm" placeholder="contoh: 119.4327"
            value="${window._sjMapStep.lng||''}" onchange="_sjCoordInputChange()">
        </div>
        <div>
          <label class="label">Wilayah</label>
          <select id="sjPickArea" class="input text-sm">
            ${db.areas.map(a=>`<option value="${a.id}" ${cust&&a.id===cust.areaId?'selected':''}>${a.nama}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="text-xs text-slate-600">
        Lokasi terpilih: <span id="sjPinAddr" class="font-semibold">${(window._sjMapStep.alamat||'(klik peta atau isi lat/lng)')}</span>
      </div>

      <!-- Save options (conditional) -->
      <div id="sjSaveBox" class="p-2 rounded-lg border border-[var(--c-line)] bg-[var(--c-surface-var)]">
        <!-- Filled dynamically by _sjRenderPicker -->
      </div>
    </div>
  `, `
    <button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal();openAddStopModal()">← Kembali</button>
    <button class="btn-primary px-4 py-2 rounded-lg" onclick="_confirmSJStop()">
      <i data-lucide="check" class="w-4 h-4 inline"></i> Tambah Titik
    </button>
  `);
  _sjRenderPicker();
  setTimeout(()=>_initSJMap(candidates), 80);
  lucide.createIcons();
}

/* --- Render alamat picker (radio-like cards) --- */
function _sjRenderPicker(){
  const step = window._sjMapStep;
  if (!step) return;
  const picker = document.getElementById('sjLokasiPicker');
  if (!picker) return;
  const cards = step.candidates.map(c=>{
    const active = step.selectedId === c.id;
    return `
      <div onclick="_sjSelectLokasi('${c.id}')" class="cursor-pointer border ${active?'border-[var(--c-accent)] bg-[var(--c-surface-var)]':'border-[var(--c-line)] hover:border-[var(--c-accent)]'} rounded-lg p-2 flex items-start gap-2 transition-all">
        <div class="mt-0.5 w-4 h-4 rounded-full border-2 ${active?'border-[var(--c-accent)]':'border-slate-400'} flex items-center justify-center flex-shrink-0">
          ${active?'<div class="w-2 h-2 rounded-full bg-[var(--c-accent)]"></div>':''}
        </div>
        <div class="min-w-0 flex-1">
          <div class="text-xs font-bold text-slate-700 flex items-center gap-1">
            ${c.label}
          </div>
          <div class="text-[11px] text-slate-500 truncate">${c.alamat||'(tanpa alamat)'}</div>
          <div class="text-[10px] text-slate-400 font-mono">${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}</div>
        </div>
      </div>`;
  }).join('');
  const newCardActive = step.selectedId == null;
  const newCard = `
    <div onclick="_sjSelectLokasi(null)" class="cursor-pointer border-2 border-dashed ${newCardActive?'border-[var(--c-accent)] bg-[var(--c-surface-var)]':'border-[var(--c-line)] hover:border-[var(--c-accent)]'} rounded-lg p-2 flex items-start gap-2 transition-all">
      <div class="mt-0.5 w-4 h-4 rounded-full border-2 ${newCardActive?'border-[var(--c-accent)]':'border-slate-400'} flex items-center justify-center flex-shrink-0">
        ${newCardActive?'<div class="w-2 h-2 rounded-full bg-[var(--c-accent)]"></div>':''}
      </div>
      <div class="min-w-0 flex-1">
        <div class="text-xs font-bold text-[var(--c-accent)] flex items-center gap-1">
          <i data-lucide="plus" class="w-3 h-3"></i> Alamat Baru (klik peta / isi lat-lng / cari)
        </div>
        <div class="text-[11px] text-slate-500">Bisa disimpan ke pelanggan sebagai alamat tambahan</div>
      </div>
    </div>`;
  picker.innerHTML = cards + newCard;

  // Render save box based on selection
  const saveBox = document.getElementById('sjSaveBox');
  if (saveBox) {
    if (step.selectedId == null) {
      // New address — show save options
      saveBox.innerHTML = `
        <div class="flex flex-wrap items-center gap-3">
          <label class="flex items-center gap-2 text-xs">
            <input type="checkbox" id="sjSaveToCust" checked> Simpan alamat ini ke pelanggan
          </label>
          <input type="text" id="sjNewLokasiLabel" class="input flex-1 min-w-32 text-xs" placeholder="Label alamat (mis. Cabang Maros)" value="Dari SJ ${(db.suratJalan||[]).find(s=>s.id===step.sjId)?.noDO||''}">
        </div>
        <p class="text-[10px] text-slate-400 mt-1">Alamat baru akan tersimpan sebagai alamat tambahan pelanggan. Alamat pengiriman untuk SJ ini tetap mengikuti data Excel/Accurate.</p>
      `;
    } else {
      // Picked existing — no save needed
      saveBox.innerHTML = `
        <div class="text-xs text-emerald-700 flex items-center gap-2">
          <i data-lucide="check-circle-2" class="w-4 h-4"></i>
          Memakai alamat tersimpan — tidak perlu simpan ulang.
        </div>
      `;
    }
    lucide.createIcons();
  }
}

function _sjSelectLokasi(id){
  const step = window._sjMapStep;
  if (!step) return;
  if (id == null) {
    // "Alamat baru" — keep current map pin if any, else clear
    step.selectedId = null;
  } else {
    const c = step.candidates.find(x=>x.id===id);
    if (!c) return;
    step.selectedId = id;
    step.lat = c.lat;
    step.lng = c.lng;
    step.alamat = c.alamat;
    if (window._modalMap) window._modalMap.setView([c.lat,c.lng], 16);
    window._sjSetPin && window._sjSetPin(c.lat, c.lng, c.alamat);
    document.getElementById('sjLatInput').value = c.lat;
    document.getElementById('sjLngInput').value = c.lng;
  }
  _sjRenderPicker();
}

function _sjCoordInputChange(){
  const lat = parseFloat(document.getElementById('sjLatInput').value);
  const lng = parseFloat(document.getElementById('sjLngInput').value);
  if (isNaN(lat) || isNaN(lng)) return;
  // Manual coord input means user is defining a new address — switch to "new" mode
  window._sjMapStep.selectedId = null;
  _sjRenderPicker();
  if (window._modalMap) window._modalMap.setView([lat,lng], 16);
  window._sjSetPin && window._sjSetPin(lat, lng);
}

function _initSJMap(candidates){
  const s = db.settings;
  const start = window._sjMapStep;
  const lat0 = start.lat || s.gudangLat || -5.1477;
  const lng0 = start.lng || s.gudangLng || 119.4327;
  const map = L.map('sjMapPin').setView([lat0,lng0], start.lat?15:12);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
    {maxZoom:19, attribution:'© OSM © CARTO'}).addTo(map);
  window._modalMap = map;
  // Gudang
  if (s.gudangLat && s.gudangLng) {
    const ico = L.divIcon({html:'<div class="warehouse-marker"><i data-lucide="warehouse"></i></div>',
      className:'', iconSize:[34,34], iconAnchor:[17,17]});
    L.marker([s.gudangLat,s.gudangLng], {icon:ico}).addTo(map).bindPopup('Gudang');
  }
  // Candidate markers — all clickable, show all stored alamat
  candidates.forEach(c=>{
    L.circleMarker([c.lat,c.lng], {
      radius:7,
      color: c.isPrimary?'#03DAC6':'#6200EE',
      fillColor: c.isPrimary?'#03DAC6':'#BB86FC',
      fillOpacity:0.8, weight:2
    }).bindPopup(`<strong>${c.label}</strong><br>${c.alamat||''}`)
      .on('click', ()=>_sjSelectLokasi(c.id))
      .addTo(map);
  });
  let pin = null;
  if (start.lat && start.lng) pin = L.marker([start.lat,start.lng], {draggable:true}).addTo(map);

  const setPin = async (lat, lng, addr) => {
    if (pin) pin.remove();
    pin = L.marker([lat,lng], {draggable:true}).addTo(map);
    pin.on('dragend', ev=>{
      const ll = ev.target.getLatLng();
      window._sjMapStep.lat = ll.lat;
      window._sjMapStep.lng = ll.lng;
      window._sjMapStep.selectedId = null;  // dragging = new address
      const latInput = document.getElementById('sjLatInput');
      const lngInput = document.getElementById('sjLngInput');
      if (latInput) latInput.value = ll.lat.toFixed(6);
      if (lngInput) lngInput.value = ll.lng.toFixed(6);
      _sjRenderPicker();
    });
    window._sjMapStep.lat = lat;
    window._sjMapStep.lng = lng;
    // Sync coord inputs
    const latInput = document.getElementById('sjLatInput');
    const lngInput = document.getElementById('sjLngInput');
    if (latInput) latInput.value = (typeof lat === 'number') ? lat.toFixed(6) : lat;
    if (lngInput) lngInput.value = (typeof lng === 'number') ? lng.toFixed(6) : lng;
    if (addr) {
      window._sjMapStep.alamat = addr;
      const addrEl = document.getElementById('sjPinAddr');
      if (addrEl) addrEl.textContent = addr;
    } else {
      const addrEl = document.getElementById('sjPinAddr');
      if (addrEl) addrEl.innerHTML = '<i class="spinner inline-block align-middle mr-1"></i> mencari alamat...';
      const got = await reverseGeocode(lat,lng);
      window._sjMapStep.alamat = got;
      const addrEl2 = document.getElementById('sjPinAddr');
      if (addrEl2) addrEl2.textContent = got;
    }
  };
  window._sjSetPin = setPin;

  map.on('click', e=>{
    // Map click = new address
    window._sjMapStep.selectedId = null;
    setPin(e.latlng.lat, e.latlng.lng);
    _sjRenderPicker();
  });
  setTimeout(()=>map.invalidateSize(), 200);
}

async function _sjMapSearch(){
  const q = document.getElementById('sjMapSearch').value.trim();
  if (!q) return;
  const r = document.getElementById('sjMapResults');
  r.classList.remove('hidden');
  r.innerHTML = '<div class="p-2 text-slate-500"><span class="spinner"></span> Cari...</div>';
  const results = await geocode(q);
  if (results.length === 0) { r.innerHTML='<div class="p-2 text-slate-500">Tidak ada hasil</div>'; return; }
  r.innerHTML = results.map(re=>`
    <div class="search-result-item" onclick="_sjPickSearchResult(${re.lat},${re.lng},'${(re.label||'').replace(/'/g,'&#39;')}')">${re.label}</div>
  `).join('');
}
function _sjPickSearchResult(lat,lng,label){
  // Search result = new address
  window._sjMapStep.selectedId = null;
  window._modalMap.setView([lat,lng], 16);
  window._sjSetPin(lat,lng,label);
  _sjRenderPicker();
  document.getElementById('sjMapResults').classList.add('hidden');
}

function _confirmSJStop(){
  const step = window._sjMapStep;
  if (!step) return;
  const sj = (db.suratJalan||[]).find(s=>s.id===step.sjId);
  if (!sj) return toast('Surat Jalan hilang','error');
  const p = window._currentPlan;
  if (!p) return toast('Tidak ada rencana aktif','error');

  // Allow manual lat/lng input as source-of-truth
  const latIn = parseFloat(document.getElementById('sjLatInput')?.value);
  const lngIn = parseFloat(document.getElementById('sjLngInput')?.value);
  if (!isNaN(latIn) && !isNaN(lngIn)) { step.lat = latIn; step.lng = lngIn; }
  if (!step.lat || !step.lng) return toast('Pilih lokasi (klik peta / isi lat-lng / pilih alamat tersimpan)','error');

  const areaId = document.getElementById('sjPickArea').value;
  const cust = sj.customerId && db.customers.find(c=>c.id===sj.customerId);

  // Build nota from SJ items (group all items into one nota = noDO)
  const nota = [{
    id: uid(),
    noNota: sj.noDO,
    items: sj.items.map(it=>({id:uid(), namaBarang:it.namaBarang, nominal:it.totalHarga}))
  }];

  // Determine which lokasi (if any) we are pointing at on the customer
  let lokasiIdUsed = null;

  if (cust) {
    if (!Array.isArray(cust.lokasi)) cust.lokasi = [];

    if (step.selectedId && step.selectedId !== 'legacy') {
      // Used an existing saved lokasi — just reference it
      lokasiIdUsed = step.selectedId;
    } else if (step.selectedId === 'legacy') {
      // Legacy single lat/lng — promote it to a lokasi entry now
      const existingByCoord = cust.lokasi.find(l=>l.lat===cust.lat && l.lng===cust.lng);
      if (existingByCoord) {
        lokasiIdUsed = existingByCoord.id;
      } else {
        const newLok = {
          id: uid(), label: 'Alamat Utama',
          alamat: cust.alamatLengkap||cust.alamat||'',
          lat: cust.lat, lng: cust.lng,
          isPrimary: !cust.lokasi.some(l=>l.isPrimary)
        };
        cust.lokasi.push(newLok);
        lokasiIdUsed = newLok.id;
      }
    } else {
      // selectedId == null → "Alamat Baru"
      const saveBox = document.getElementById('sjSaveBox');
      const saveToCust = saveBox && document.getElementById('sjSaveToCust')?.checked;
      const labelInp = document.getElementById('sjNewLokasiLabel')?.value?.trim() || ('Dari SJ ' + sj.noDO);
      const markPrimary = document.getElementById('sjMarkPrimary')?.checked;

      if (saveToCust) {
        // Skip duplicates by coord (small tolerance)
        const dup = cust.lokasi.find(l =>
          l.lat && l.lng &&
          Math.abs(l.lat - step.lat) < 1e-6 &&
          Math.abs(l.lng - step.lng) < 1e-6);
        if (dup) {
          lokasiIdUsed = dup.id;
          if (!dup.alamat && step.alamat) dup.alamat = step.alamat;
        } else {
          const newLok = {
            id: uid(),
            label: labelInp,
            alamat: step.alamat || '',
            lat: step.lat,
            lng: step.lng
          };
          cust.lokasi.push(newLok);
          lokasiIdUsed = newLok.id;
        }
        // Backfill legacy lat/lng only if customer had none — never overwrite
        if (!cust.lat || !cust.lng) {
          cust.lat = step.lat; cust.lng = step.lng;
        }
      }
      // If not saving, lokasiIdUsed stays null — stop carries the coords directly
    }
  }

  const stopId = uid();
  p.stops.push({
    id: stopId,
    suratJalanId: sj.id,
    customerId: cust?.id || null,
    customerLokasiId: lokasiIdUsed,
    customerNama: sj.pelanggan,
    areaId,
    lat: step.lat,
    lng: step.lng,
    alamat: step.alamat || sj.alamat || '',
    sourceType: 'suratjalan',
    nota
  });

  sj.status = 'planned';
  sj.planId = p.id;
  sj.stopId = stopId;

  if (p.autoRoute) p.autoRoute = null;
  saveDB();
  _updateSJBadge();
  window._sjMapStep = null;
  closeModal();
  refreshStopsList(); refreshSummary(); renderRouteMap();
  toast(`Titik ditambahkan: ${sj.pelanggan}`);
}

/* --- Import handler --- */
function importSJFromExcel(file){
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const parsed = _parseSJExcel(wb);
      if (parsed.length === 0) return toast('Tidak ada data SJ ditemukan di file','error');

      // Check duplicates
      const existing = new Set((db.suratJalan||[]).map(s=>s.noDO));
      const newSJ    = parsed.filter(s=>!existing.has(s.noDO));
      const dupCount = parsed.length - newSJ.length;

      // Preview modal
      const previewRows = newSJ.slice(0,10).map(s=>`
        <tr>
          <td class="text-xs">${s.noDO}</td>
          <td class="text-xs">${fmtDate(s.tanggal)}</td>
          <td class="text-xs font-semibold">${s.pelanggan}</td>
          <td class="text-xs">${s.items.length} item</td>
          <td class="text-xs text-right font-semibold">${fmtRp(s.totalHarga)}</td>
        </tr>`).join('');
      const moreRow = newSJ.length > 10
        ? `<tr><td colspan="5" class="text-xs text-center text-slate-400 py-2">...dan ${newSJ.length-10} SJ lainnya</td></tr>` : '';

      window._pendingSJImport = newSJ;

      openModal('Preview Import Surat Jalan',`
        <div class="space-y-4">
          <div class="grid grid-cols-3 gap-3">
            <div class="p-3 bg-blue-50 rounded-xl text-center">
              <div class="text-2xl font-bold text-blue-700">${parsed.length}</div>
              <div class="text-xs text-slate-500 mt-0.5">Total SJ di file</div>
            </div>
            <div class="p-3 bg-emerald-50 rounded-xl text-center">
              <div class="text-2xl font-bold text-emerald-700">${newSJ.length}</div>
              <div class="text-xs text-slate-500 mt-0.5">SJ baru</div>
            </div>
            <div class="p-3 bg-amber-50 rounded-xl text-center">
              <div class="text-2xl font-bold text-amber-700">${dupCount}</div>
              <div class="text-xs text-slate-500 mt-0.5">Duplikat (dilewati)</div>
            </div>
          </div>
          ${newSJ.length === 0
            ? `<div class="p-4 bg-amber-50 rounded-xl text-amber-900 text-sm text-center">Semua SJ sudah ada di database.</div>`
            : `<div class="overflow-x-auto">
               <table>
                 <thead><tr>
                   <th>No. DO</th><th>Tanggal</th><th>Pelanggan</th><th>Items</th><th>Total</th>
                 </tr></thead>
                 <tbody>${previewRows}${moreRow}</tbody>
               </table>
               </div>`}
        </div>`,
        newSJ.length === 0
          ? `<button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal()">Tutup</button>`
          : `<button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal()">Batal</button>
             <button class="btn-primary px-4 py-2 rounded-lg" onclick="_confirmSJImport()">
               <i data-lucide="check" class="w-4 h-4 inline"></i> Simpan ${newSJ.length} SJ
             </button>`
      );
    } catch(err){
      console.error(err);
      toast('Gagal membaca file: '+err.message,'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

function _confirmSJImport(){
  const newSJ = window._pendingSJImport;
  if (!Array.isArray(newSJ) || newSJ.length === 0) return toast('Tidak ada data untuk diimport','error');
  if (!Array.isArray(db.suratJalan)) db.suratJalan = [];
  if (!Array.isArray(db.customers)) db.customers = [];

  // Auto-create / link customer for each SJ
  let createdCust = 0, addedLokasi = 0;
  newSJ.forEach(sj=>{
    if (!sj.pelanggan) return;
    const key = sj.pelanggan.trim().toLowerCase();
    let cust = db.customers.find(c => (c.nama||'').trim().toLowerCase() === key);
    if (!cust) {
      cust = {
        id: uid(),
        nama: sj.pelanggan.trim(),
        toko: '',
        alamat: sj.alamat || '',
        alamatLengkap: sj.alamat || '',
        areaId: db.areas[0]?.id || '',
        telepon: sj.noTelp || '',
        lat: null,
        lng: null,
        lokasi: sj.alamat ? [{
          id: uid(),
          label: 'Dari Import SJ',
          alamat: sj.alamat,
          lat: null, lng: null,
          isPrimary: true
        }] : [],
        autoCreated: true
      };
      db.customers.push(cust);
      createdCust++;
    } else {
      // Fill blanks
      if (!cust.telepon && sj.noTelp) cust.telepon = sj.noTelp;
      if (!cust.alamat && sj.alamat) { cust.alamat = sj.alamat; cust.alamatLengkap = sj.alamat; }
      if (!Array.isArray(cust.lokasi)) cust.lokasi = [];
      // Add SJ address as additional lokasi if not already present
      if (sj.alamat && !cust.lokasi.some(l => (l.alamat||'').toLowerCase() === sj.alamat.toLowerCase())) {
        cust.lokasi.push({
          id: uid(),
          label: 'Dari SJ ' + sj.noDO,
          alamat: sj.alamat,
          lat: null, lng: null,
          isPrimary: cust.lokasi.length === 0
        });
        addedLokasi++;
      }
    }
    sj.customerId = cust.id;
  });

  // Push SJ in chunks
  for (let i = 0; i < newSJ.length; i += 500) {
    db.suratJalan.push(...newSJ.slice(i, i+500));
  }
  try {
    saveDB();
  } catch(err){
    console.error(err);
    return toast('Gagal simpan: '+(err.message||'localStorage penuh'),'error');
  }
  window._pendingSJImport = null;
  _updateSJBadge();
  closeModal();
  renderSuratJalan();
  const extra = createdCust>0 || addedLokasi>0
    ? ` · ${createdCust} pelanggan baru${addedLokasi?', '+addedLokasi+' alamat baru':''}`
    : '';
  toast(`${newSJ.length} SJ diimport${extra} ✓`);
}

/* --- Clear all SJ (with safety: only unplanned will be deleted by default) --- */
function _clearAllSJ(){
  const all = db.suratJalan||[];
  const planned = all.filter(s=>s.status!=='unplanned').length;
  const unplanned = all.length - planned;
  openModal('Hapus Semua Surat Jalan',`
    <div class="space-y-3">
      <p class="text-sm">Anda akan menghapus data Surat Jalan berikut:</p>
      <ul class="text-sm space-y-1 pl-4">
        <li>• <strong>${unplanned}</strong> SJ <em>belum direncanakan</em></li>
        <li>• <strong>${planned}</strong> SJ <em>sudah direncanakan / selesai</em></li>
      </ul>
      <div class="p-3 bg-amber-50 rounded-lg text-amber-900 text-xs flex gap-2">
        <i data-lucide="alert-triangle" class="w-4 h-4 flex-shrink-0"></i>
        <div>
          <strong>Catatan:</strong> SJ yang sudah terhubung ke rencana rute tidak akan ikut terhapus untuk menjaga integritas data.
          Pilih opsi di bawah.
        </div>
      </div>
    </div>`,
    `<button class="btn-secondary px-4 py-2 rounded-lg" onclick="closeModal()">Batal</button>
     <button class="btn-danger px-4 py-2 rounded-lg" onclick="_doClearSJ('unplanned')">Hapus ${unplanned} (Belum Rute)</button>
     ${planned>0?`<button class="btn-danger px-4 py-2 rounded-lg" onclick="_doClearSJ('all')">Hapus Semua (${all.length})</button>`:''}`
  );
}
function _doClearSJ(mode){
  if (mode === 'all') {
    // Also unlink any plan stops that reference these SJ
    (db.plans||[]).forEach(p=>{
      (p.stops||[]).forEach(st=>{ if (st.suratJalanId) { st.suratJalanId = null; }});
    });
    db.suratJalan = [];
  } else {
    db.suratJalan = (db.suratJalan||[]).filter(s=>s.status!=='unplanned');
  }
  saveDB(); _updateSJBadge(); closeModal(); renderSuratJalan();
  toast('Data Surat Jalan dihapus ✓');
}

/* --- Delete SJ --- */
function deleteSJ(id){
  const sj = (db.suratJalan||[]).find(s=>s.id===id);
  if (!sj) return;
  if (sj.status !== 'unplanned') return toast('Hanya SJ belum direncanakan yang bisa dihapus','error');
  confirmDelete(`Hapus Surat Jalan <strong>${sj.noDO}</strong> (${sj.pelanggan})?`, ()=>{
    db.suratJalan = db.suratJalan.filter(s=>s.id!==id);
    saveDB(); _updateSJBadge(); renderSuratJalan();
    toast('Surat Jalan dihapus');
  });
}

/* --- Geo modal: cek / set lat-lng pelanggan terkait SJ --- */
function openSJGeoModal(sjId){
  const sj = (db.suratJalan||[]).find(s=>s.id===sjId);
  if (!sj) return;
  let cust = sj.customerId ? db.customers.find(c=>c.id===sj.customerId) : null;
  if (!cust) cust = db.customers.find(c=>(c.nama||'').toLowerCase() === (sj.pelanggan||'').toLowerCase());
  if (!cust) {
    return openModal('Pelanggan tidak ditemukan', `
      <div class="p-4 bg-amber-50 rounded-lg text-amber-900 text-sm">
        Surat Jalan ini belum terhubung ke pelanggan di database.
        Cek apakah nama pelanggan di Excel sama persis dengan di Master Pelanggan.
      </div>`, `<button class="btn-primary px-4 py-2 rounded-lg" onclick="closeModal()">Tutup</button>`);
  }

  if (!Array.isArray(cust.lokasi)) cust.lokasi = [];
  const list = cust.lokasi.slice();
  if (list.length === 0 && (cust.lat && cust.lng)) {
    list.push({id:'legacy', label:'Alamat Utama (lama)', alamat:cust.alamatLengkap||cust.alamat||'', lat:cust.lat, lng:cust.lng});
  }
  const hasAnyGeo = list.some(l=>l.lat && l.lng);

  window._sjGeoCtx = { sjId, custId: cust.id };
